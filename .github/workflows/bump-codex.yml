name: Bump codex across repos

# Manual fan-out across every repos.yaml target that pins codex in its Flox env
# (select(.kind != "agent"); the 6 kind=agent repos have no codex pin). Per target:
# bump the codex.version floor in .flox/env/manifest.toml to the latest flox catalog
# version (normalized to a caret pin), isolate codex in its own pkg-group ("codex")
# so the raised floor resolves independently of co-resident packages, refresh the
# lock, and open one PR.
#
# codex is a local-authoring CLI (not a bot, not adl-generated), so unlike the
# migrate-* workflows there is no thin caller to write and no config to regenerate -
# this touches only .flox/env/*. It mirrors the claude-code flox bump in
# migrate-claude.yml: codex is a flox CATALOG package (codex.version = "^X.Y.Z"), not
# a GitHub release, so the latest comes from `flox show codex` (never npm). With no
# `init` analog, `flox activate -- true` runs after `flox upgrade codex` purely to
# write manifest.lock in canonical form.
#
# App scope per target: contents:write, pull-requests:write. No workflows:write
# (this never writes a file under .github/workflows/).

on:
  workflow_dispatch:
    inputs:
      codex_version:
        description: 'codex catalog version to pin (e.g. 0.135.0). Blank = latest from `flox show codex`.'
        required: false
        type: string
        default: ''
      repository:
        description: 'Single repos.yaml target to bump (omit = all codex-bearing targets). Use to test on one repo.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Print diff but skip PR creation (manual runs preview by default)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
      codex_version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Flox
        uses: flox/install-flox-action@v2.5.1

      - name: Resolve codex catalog version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.codex_version }}
        run: |
          set -euo pipefail
          V="$INPUT_VERSION"
          if [ -z "$V" ]; then
            V=$(flox show codex 2>/dev/null | grep -oE 'codex@[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's|codex@||' || true)
          fi
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Unexpected codex version (input or from flox show): '$V'"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "::notice::Targets' Flox codex pin will be bumped to ^${V}"

      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: '.kind != "agent"'
          repository: ${{ inputs.repository }}

  bump:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    concurrency:
      group: bump-codex-${{ matrix.target.name }}
      cancel-in-progress: false
    env:
      CODEX_VERSION: ${{ needs.matrix.outputs.codex_version }}
    steps:
      - name: Mint GitHub App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.BOT_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.BOT_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v6.0.3
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Install Flox
        uses: flox/install-flox-action@v2.5.1

      - name: Bump codex pin in the target's Flox manifest
        id: bump
        working-directory: target
        env:
          NEW: ${{ env.CODEX_VERSION }}
        run: |
          set -euo pipefail
          if [ ! -f .flox/env/manifest.toml ]; then
            echo "::error::${{ matrix.target.name }} has no .flox/env/manifest.toml"
            exit 1
          fi
          LINE=$(grep -E '^codex\.version' .flox/env/manifest.toml | head -1 || true)
          OLD_PIN=$(printf '%s' "$LINE" | cut -d'"' -f2)
          OLD=$(printf '%s' "$OLD_PIN" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$OLD" ]; then
            echo "::error::${{ matrix.target.name }} .flox/env/manifest.toml has no codex.version pin"
            exit 1
          fi
          echo "old=$OLD" >> "$GITHUB_OUTPUT"

          # Isolate codex in its OWN flox pkg-group. Flox resolves every package in a group against a
          # single catalog page; sharing the default "ai" group makes a raised floor unsatisfiable.
          # A dedicated group lets codex float to its latest independently of claude-code.
          CUR_GROUP=$(grep -E '^codex\.pkg-group' .flox/env/manifest.toml | head -1 | cut -d'"' -f2 || true)
          if [ "$CUR_GROUP" = "codex" ]; then
            echo "::notice::${{ matrix.target.name }}: codex already isolated in its own pkg-group"
          elif [ -n "$CUR_GROUP" ]; then
            sed -i "s|codex.pkg-group = \"${CUR_GROUP}\"|codex.pkg-group = \"codex\"|" .flox/env/manifest.toml
            echo "::notice::${{ matrix.target.name }}: codex pkg-group ${CUR_GROUP} -> codex"
          else
            sed -i "s|^\(codex\.pkg-path = .*\)$|\1\ncodex.pkg-group = \"codex\"|" .flox/env/manifest.toml
            echo "::notice::${{ matrix.target.name }}: added codex.pkg-group = codex"
          fi

          # Normalize the floor to a caret pin (^X.Y.Z) regardless of the prior operator.
          if [ "$OLD_PIN" = "^${NEW}" ]; then
            echo "::notice::${{ matrix.target.name }} already pins codex ^${NEW}"
          else
            sed -i "s|codex.version = \"${OLD_PIN}\"|codex.version = \"^${NEW}\"|" .flox/env/manifest.toml
            echo "::notice::${{ matrix.target.name }}: codex ${OLD_PIN} -> ^${NEW}"
          fi

      - name: Refresh Flox lock (scoped to codex)
        working-directory: target
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ steps.token.outputs.token }}"
        run: |
          flox upgrade codex
          flox activate -- true

      - name: Skip check
        id: skip
        working-directory: target
        run: |
          set -euo pipefail
          git add -- .flox/env/manifest.toml .flox/env/manifest.lock
          if git diff --cached --quiet -- .flox/env/manifest.toml .flox/env/manifest.lock; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: codex pin + group already current; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: codex pin / group will be updated"
          fi

      - name: Compose PR title
        id: meta
        if: steps.skip.outputs.skip != 'true'
        env:
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ env.CODEX_VERSION }}
        run: |
          set -euo pipefail
          if [ "$OLD" != "$NEW" ]; then
            title="chore(deps): bump codex ${OLD} -> ${NEW}"
          else
            title="ci: isolate codex in its own flox pkg-group"
          fi
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "::notice::PR title -> $title"

      - name: Show diff
        if: steps.skip.outputs.skip != 'true'
        working-directory: target
        run: git -c color.ui=always diff --cached -- .flox/env/manifest.toml .flox/env/manifest.lock || true

      - name: Create or update pull request
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run }}
        id: pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.token.outputs.token }}
          path: target
          branch: bot/bump-codex-${{ env.CODEX_VERSION }}
          base: main
          sign-commits: true
          delete-branch: true
          add-paths: |
            .flox/env/manifest.toml
            .flox/env/manifest.lock
          commit-message: ${{ steps.meta.outputs.title }}
          title: ${{ steps.meta.outputs.title }}
          body: |
            ## Summary
            Bumps this repo's Flox `codex` pin (`.flox/env/manifest.toml`) to
            `^${{ needs.matrix.outputs.codex_version }}` (the latest flox catalog version),
            isolates `codex` in its own `pkg-group = "codex"`, and refreshes `.flox/env/manifest.lock`.

            Ran in CI:
            - sed the `codex.version` floor to a caret pin at the latest catalog version
            - moved `codex` into its own `pkg-group = "codex"` so its raised floor resolves
              independently of co-resident packages (a shared `ai` group made the constraints
              unsatisfiable)
            - `flox upgrade codex` + `flox activate` to refresh `.flox/env/manifest.lock` in canonical form

            > **Note:** `codex` is a flox catalog package (nixpkgs mirror), not a GitHub release,
            > so the latest version is read from `flox show codex`. No config is regenerated
            > (codex has no `init` step), and no workflow file is touched.

            Filed by [bump-codex.yml](https://github.com/inference-gateway/.github/blob/main/.github/workflows/bump-codex.yml).
          labels: |
            dependencies
            codex

      - name: Report PR outcome
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run && steps.pr.outputs.pull-request-number != '' }}
        run: |
          {
            echo "### ${{ matrix.target.name }}"
            echo "- Operation: \`${{ steps.pr.outputs.pull-request-operation }}\`"
            echo "- Title: \`${{ steps.meta.outputs.title }}\`"
            echo "- codex: \`${{ steps.bump.outputs.old }}\` -> \`${{ needs.matrix.outputs.codex_version }}\`"
            echo "- PR: ${{ steps.pr.outputs.pull-request-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run summary
        if: ${{ steps.skip.outputs.skip != 'true' && inputs.dry_run }}
        working-directory: target
        run: |
          {
            echo "## Dry-run: ${{ matrix.target.name }} codex ${{ steps.bump.outputs.old }} -> ${{ env.CODEX_VERSION }}"
            echo '```diff'
            git diff --cached -- .flox/env/manifest.toml .flox/env/manifest.lock || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
