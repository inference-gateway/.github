name: Claude Code (reusable)

# Reusable @claude bot workflow for the inference-gateway org.
#
# Single source of truth for the per-repo `.github/workflows/claude.yml` that
# every repo used to copy-paste (~120 lines, ~80% identical). Callers now reduce
# to a ~10-line `uses:` invocation; a fix here (e.g. an invalid --effort value)
# is one commit + a tag move instead of one PR per repo.
#
# Caller contract:
#   jobs.claude.uses: inference-gateway/.github/.github/workflows/claude.yml@v1
# The `on:` triggers and the `@claude` gate `if:` stay in the caller (event
# triggers cannot live in a reusable workflow, and keeping the gate on the
# caller job avoids spinning up this runner for every non-@claude comment).
#
# Tools model: a constant default set applies to EVERY repo; the `language`
# preset appends its toolchain tools; `extra-tools` appends per-repo specifics.

on:
  workflow_call:
    inputs:
      language:
        description: 'Toolchain preset: go | rust | typescript | node | python | none'
        type: string
        default: none
      skill:
        description: 'Org skill to install: maintainer | adl'
        type: string
        default: maintainer
      runner:
        description: 'Runner image (low-code passes ubuntu-latest)'
        type: string
        default: ubuntu-24.04
      effort:
        description: 'Claude effort: low | medium | high | xhigh | max (NOT ultracode)'
        type: string
        default: max
      model:
        description: 'Claude model id'
        type: string
        default: claude-opus-4-8
      prompt:
        description: 'Free-text task for manual (workflow_dispatch) runs. Empty = issue/PR mode (task comes from the @claude comment).'
        type: string
        default: ''
      extra-tools:
        description: 'Comma-separated tools appended to the default + language tool set, e.g. "Bash(helm:*)"'
        type: string
        default: ''
      allowed-tools:
        description: 'Full --allowedTools override. When set, replaces the default+language+extra set entirely (escape hatch for repos that deliberately narrow scope).'
        type: string
        default: ''
      node:
        description: 'Force Node setup even when language is not typescript/node (Go repos that also need Node)'
        type: boolean
        default: false
      context7:
        description: 'Include the context7 MCP server (+ mcp__context7 tool)'
        type: boolean
        default: true
      playwright:
        description: 'Install Chromium and add the playwright MCP server (+ mcp__playwright tool)'
        type: boolean
        default: false
      markdownlint:
        description: 'Set up Node and install markdownlint-cli'
        type: boolean
        default: false
      precommit:
        description: 'Install pre-commit and run `task precommit:install`'
        type: boolean
        default: false
      extra-mcp-servers:
        description: 'JSON object of additional mcpServers merged into --mcp-config'
        type: string
        default: '{}'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: 'OAuth token for anthropics/claude-code-action (callers use `secrets: inherit`)'
        required: true

jobs:
  claude:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.48.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint
        if: inputs.language == 'go'
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
          args: --help

      - name: Set up Rust
        if: inputs.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          components: clippy, rustfmt

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Set up Node.js
        if: inputs.language == 'typescript' || inputs.language == 'node' || inputs.node || inputs.markdownlint || inputs.playwright
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install markdownlint
        if: inputs.markdownlint
        run: npm install -g markdownlint-cli

      - name: Install pre-commit
        if: inputs.precommit
        run: |
          set -euo pipefail
          pip install pre-commit
          task precommit:install

      - name: Install Playwright + Chromium
        if: inputs.playwright
        run: npx -y playwright@latest install --with-deps chromium

      - name: Install ${{ inputs.skill }} skill
        env:
          SKILL: ${{ inputs.skill }}
        run: |
          set -euo pipefail
          mkdir -p ~/.claude/skills
          if [ "$SKILL" = "adl" ]; then
            mkdir -p ~/.claude/skills/adl
            curl -fsSL \
              https://raw.githubusercontent.com/inference-gateway/skills/main/skills/adl/SKILL.md \
              -o ~/.claude/skills/adl/SKILL.md
          else
            rm -rf ~/.claude/skills/"$SKILL"
            curl -fsSL https://codeload.github.com/inference-gateway/skills/tar.gz/main |
              tar -xz --strip-components=2 -C ~/.claude/skills "skills-main/skills/$SKILL"
          fi

      - name: Determine branch prefix
        id: prefix
        env:
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          text="$(printf '%s %s' "$ISSUE_LABELS" "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')"
          case "$text" in
            *bug*|*fix*|*defect*|*regression*|*hotfix*) prefix="fix/" ;;
            *feat*|*feature*|*enhancement*)             prefix="feat/" ;;
            *docs*|*documentation*)                     prefix="docs/" ;;
            *refactor*)                                 prefix="refactor/" ;;
            *)                                          prefix="claude/" ;;
          esac
          echo "Resolved branch prefix: $prefix"
          echo "value=$prefix" >> "$GITHUB_OUTPUT"

      - name: Compose Claude args
        id: args
        env:
          LANGUAGE: ${{ inputs.language }}
          ALLOWED: ${{ inputs.allowed-tools }}
          EXTRA_TOOLS: ${{ inputs.extra-tools }}
          CONTEXT7: ${{ inputs.context7 }}
          PLAYWRIGHT: ${{ inputs.playwright }}
          EXTRA_MCP: ${{ inputs.extra-mcp-servers }}
          NODE: ${{ inputs.node }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          servers='{}'
          if [ "$CONTEXT7" = "true" ]; then
            servers="$(echo "$servers" | jq -c '. + {context7:{command:"npx",args:["-y","@upstash/context7-mcp@latest"]}}')"
          fi
          if [ "$PLAYWRIGHT" = "true" ]; then
            servers="$(echo "$servers" | jq -c '. + {playwright:{command:"npx",args:["-y","@playwright/mcp@latest","--headless","--browser","chromium","--isolated"]}}')"
          fi
          servers="$(echo "$servers" | jq -c --argjson extra "$EXTRA_MCP" '. + $extra')"

          if [ -n "$ALLOWED" ]; then
            tools="$ALLOWED"
          else
            tools='Bash(task:*),Bash(gh:*),Bash(git:*)'
            tools="$tools,Bash(grep:*),Bash(rg:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(cut:*),Bash(diff:*),Bash(tree:*),Bash(jq:*)"
            tools="$tools,Bash(echo:*),Bash(pwd:*),Bash(which:*),Bash(file:*),Bash(stat:*),Bash(basename:*),Bash(dirname:*)"
            tools="$tools,Bash(sed:*),Bash(awk:*),Bash(xargs:*)"
            case "$LANGUAGE" in
              go)      tools="$tools,Bash(go:*)" ;;
              rust)             tools="$tools,Bash(cargo:*),Bash(rustup:*),Bash(rustc:*)" ;;
              typescript|node)  tools="$tools,Bash(node:*),Bash(npm:*)" ;;
              python)           tools="$tools,Bash(python:*),Bash(python3:*)" ;;
            esac
            [ "$NODE" = "true" ]       && tools="$tools,Bash(node:*),Bash(npm:*)"
            [ "$CONTEXT7" = "true" ]   && tools="$tools,mcp__context7"
            [ "$PLAYWRIGHT" = "true" ] && tools="$tools,mcp__playwright"
            [ -n "$EXTRA_TOOLS" ]      && tools="$tools,$EXTRA_TOOLS"
          fi

          if [ "$EVENT" = "workflow_dispatch" ]; then
            tools="$tools,Edit,Write,MultiEdit"
          fi

          echo "tools=$tools" >> "$GITHUB_OUTPUT"
          if [ "$servers" = "{}" ]; then
            echo "mcp_arg=" >> "$GITHUB_OUTPUT"
          else
            echo "mcp_arg=--mcp-config '{\"mcpServers\":$servers}'" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose prompt
        id: prompt
        env:
          EVENT: ${{ github.event_name }}
          USER_PROMPT: ${{ inputs.prompt }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
        run: |
          set -euo pipefail

          case "$EVENT" in
            issues)                                          context=issue ;;
            pull_request_review|pull_request_review_comment) context=pr ;;
            issue_comment) if [ "$IS_PR_COMMENT" = "true" ]; then context=pr; else context=issue; fi ;;
            *)                                               context=task ;;
          esac

          common="$(cat <<'RULES'
          **COMMIT RULES:**
          - Do NOT add "Co-authored-by" lines to commits
          - Do NOT add "Generated with Claude Code" or similar attributions
          - Keep commits clean and professional

          **OUTPUT RULES:**

          ## Commit Message Requirements (max 72 chars)
          - Use conventional commit format with lowercase type (e.g., "fix:", "feat:", "refactor:")
          RULES
          )"

          if [ "$context" = "issue" ]; then
          body="$(cat <<'ISSUE'
          **WHEN WORKING ON THIS ISSUE:**
          After you finish implementing the code changes and committing them, open a pull request:
          ```
          gh pr create --title "Your descriptive title" --body "## Summary
          Your summary of what was implemented.

          Closes #__N__"
          ```
          Always include a summary of changes AND "Closes #__N__" in the body.
          ISSUE
          )"
          body="${body//__N__/$ISSUE_NUMBER}"
          elif [ "$context" = "pr" ]; then
          body="$(cat <<'PR'
          **WHEN WORKING ON PR FEEDBACK:**
          Make the requested changes and commit. The PR will automatically update - do NOT open a new PR.

          **WHEN FIXING CI FAILURES:**
          Fix the issues, commit the fix. The CI will automatically re-run.
          PR
          )"
          else
          body="$(printf '%s\n\n%s' "$USER_PROMPT" "If your work changes files, commit them on a new branch and open a pull request - do NOT push to the default branch.")"
          fi

          {
            echo 'text<<__CLAUDE_PROMPT_EOF__'
            printf '%s\n\n%s\n' "$body" "$common"
            echo '__CLAUDE_PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

          echo "::group::Composed prompt (context=$context)"
          printf '%s\n\n%s\n' "$body" "$common"
          echo "::endgroup::"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          display_report: true
          additional_permissions: |
            actions: read
          use_commit_signing: ${{ github.event_name != 'workflow_dispatch' }}
          base_branch: main
          branch_prefix: ${{ steps.prefix.outputs.value }}
          claude_args: |
            --effort ${{ inputs.effort }}
            --model ${{ inputs.model }}
            --allowedTools "${{ steps.args.outputs.tools }}"
            ${{ steps.args.outputs.mcp_arg }}
          prompt: ${{ steps.prompt.outputs.text }}
          track_progress: ${{ github.event_name != 'workflow_dispatch' }}
