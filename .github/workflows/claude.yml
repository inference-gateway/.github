---
name: Claude Code (reusable)

# Reusable @claude bot workflow for the inference-gateway org.
#
# Single source of truth for the per-repo `.github/workflows/claude.yml` that
# every repo used to copy-paste (~120 lines, ~80% identical). Callers now reduce
# to a ~10-line `uses:` invocation; a fix here (e.g. an invalid --effort value)
# is one commit + a tag move instead of one PR per repo.
#
# Caller contract:
#   jobs.claude.uses: inference-gateway/.github/.github/workflows/claude.yml@v1
# The `on:` triggers and the `@claude` gate `if:` stay in the caller (event
# triggers cannot live in a reusable workflow, and keeping the gate on the
# caller job avoids spinning up this runner for every non-@claude comment).
#
# Tools model: a constant default set applies to EVERY repo; the `language`
# preset appends its toolchain tools; `extra-tools` appends per-repo specifics.

on:
  workflow_call:
    inputs:
      language:
        description: 'Toolchain preset: go | rust | typescript | node | python | bun | none'
        type: string
        default: none
      runner:
        description: 'Runner image (low-code passes ubuntu-latest)'
        type: string
        default: ubuntu-24.04
      effort:
        description: 'Claude effort: low | medium | high | xhigh | max (NOT ultracode)'
        type: string
        default: max
      model:
        description: 'Claude model id'
        type: string
        default: claude-opus-4-8
      prompt:
        description: 'Free-text task for manual (workflow_dispatch) runs. Empty = issue/PR mode (task comes from the @claude comment).'
        type: string
        default: ''
      extra-tools:
        description: 'Comma-separated tools appended to the default + language tool set, e.g. "Bash(helm:*)"'
        type: string
        default: ''
      allowed-tools:
        description: 'Full --allowedTools override. When set, replaces the default+language+extra set entirely (escape hatch for repos that deliberately narrow scope).'
        type: string
        default: ''
      node:
        description: 'Force Node setup even when language is not typescript/node (Go repos that also need Node)'
        type: boolean
        default: false
      context7:
        description: 'Include the context7 MCP server (+ mcp__context7 tool)'
        type: boolean
        default: true
      browser:
        description: 'Enable the browser MCP server for this run (installs Chromium + adds the @playwright/mcp server and the mcp__playwright tool). Sources, ORed: the static per-repo value from repos.yaml, the dispatch checkbox (forwarded by the caller), and a case-insensitive [browser] marker in the issue/comment/review body or issue title.'
        type: boolean
        default: false
      markdownlint:
        description: 'Set up Node and install markdownlint-cli'
        type: boolean
        default: false
      precommit:
        description: 'Install pre-commit and run `task precommit:install`'
        type: boolean
        default: false
      extra-mcp-servers:
        description: 'JSON object of additional mcpServers merged into --mcp-config'
        type: string
        default: '{}'
      debug:
        description: 'Enable Claude CLI debug logging (--debug -> stderr) and full JSON output (show_full_output) in the run log. Defaults false; turn on per-repo via repos.yaml for verbose agent logs (private repos only - debug output can include sensitive values).'
        type: boolean
        default: false
      memory:
        description: 'Persist Claude Code auto-memory across runs by syncing ~/.claude/memory to/from the private inference-gateway/.memory repo (claude branch). When false, memory stays ephemeral (per-run, machine-local).'
        type: boolean
        default: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: 'OAuth token for anthropics/claude-code-action (callers use `secrets: inherit`)'
        required: true

permissions:
  contents: read

jobs:
  claude:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
            .github
            .memory
            docs
    
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Set up Git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git config --global commit.gpgsign false
          git config --global commit.signoff true
    
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Install task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.48.0
          repo-token: ${{ steps.app-token.outputs.token }}

      - name: Install Flox
        uses: flox/install-flox-action@v2.5.3
        with:
          version: "1.13.0"

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint
        if: inputs.language == 'go'
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2
          args: --help

      - name: Set up Rust
        if: inputs.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          components: clippy, rustfmt

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.x'

      - name: Set up Bun
        if: inputs.language == 'bun'
        uses: oven-sh/setup-bun@v2.2.0

      - name: Resolve browser mode
        id: browser
        env:
          BROWSER_INPUT: ${{ inputs.browser }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -euo pipefail
          enabled=false
          if [ "$BROWSER_INPUT" = "true" ]; then
            enabled=true
          elif printf '%s\n%s\n%s\n%s\n' \
                 "$ISSUE_TITLE" "$ISSUE_BODY" "$COMMENT_BODY" "$REVIEW_BODY" \
               | grep -qiF '[browser]'; then
            enabled=true
          fi
          echo "Browser MCP enabled: $enabled"
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: inputs.language == 'typescript' || inputs.language == 'node' || inputs.node || inputs.markdownlint || steps.browser.outputs.enabled == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install markdownlint
        if: inputs.markdownlint
        run: npm install -g markdownlint-cli

      - name: Install pre-commit
        if: inputs.precommit
        run: |
          set -euo pipefail
          pip install pre-commit
          task precommit:install

      - name: Install Playwright + Chromium
        if: steps.browser.outputs.enabled == 'true'
        run: npx -y playwright@latest install --with-deps chromium

      - name: Determine branch prefix
        id: prefix
        env:
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          text="$(printf '%s %s' "$ISSUE_LABELS" "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')"
          case "$text" in
            *bug*|*fix*|*defect*|*regression*|*hotfix*) prefix="fix/" ;;
            *feat*|*feature*|*enhancement*)             prefix="feat/" ;;
            *docs*|*documentation*)                     prefix="docs/" ;;
            *refactor*)                                 prefix="refactor/" ;;
            *)                                          prefix="claude/" ;;
          esac
          echo "Resolved branch prefix: $prefix"
          echo "value=$prefix" >> "$GITHUB_OUTPUT"

      - name: Compose Claude args
        id: args
        env:
          LANGUAGE: ${{ inputs.language }}
          ALLOWED: ${{ inputs.allowed-tools }}
          EXTRA_TOOLS: ${{ inputs.extra-tools }}
          CONTEXT7: ${{ inputs.context7 }}
          BROWSER: ${{ steps.browser.outputs.enabled }}
          EXTRA_MCP: ${{ inputs.extra-mcp-servers }}
          NODE: ${{ inputs.node }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          servers='{}'
          if [ "$CONTEXT7" = "true" ]; then
            servers="$(echo "$servers" | jq -c '. + {context7:{command:"npx",args:["-y","@upstash/context7-mcp@latest"]}}')"
          fi
          if [ "$BROWSER" = "true" ]; then
            servers="$(echo "$servers" | jq -c '. + {playwright:{command:"npx",args:["-y","@playwright/mcp@latest","--headless","--browser","chromium","--isolated"]}}')"
          fi
          servers="$(echo "$servers" | jq -c --argjson extra "$EXTRA_MCP" '. + $extra')"

          if [ -n "$ALLOWED" ]; then
            tools="$ALLOWED"
          else
            tools='Bash(task:*),Bash(gh:*),Bash(git:*)'
            tools="$tools,Bash(grep:*),Bash(rg:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(cut:*),Bash(diff:*),Bash(tree:*),Bash(jq:*)"
            tools="$tools,Bash(echo:*),Bash(pwd:*),Bash(which:*),Bash(file:*),Bash(stat:*),Bash(basename:*),Bash(dirname:*),Bash(mkdir:*)"
            tools="$tools,Bash(sed:*),Bash(awk:*),Bash(xargs:*)"
            case "$LANGUAGE" in
              go)      tools="$tools,Bash(go:*)" ;;
              rust)             tools="$tools,Bash(cargo:*),Bash(rustup:*),Bash(rustc:*)" ;;
              typescript|node)  tools="$tools,Bash(node:*),Bash(npm:*)" ;;
              python)           tools="$tools,Bash(python:*),Bash(python3:*)" ;;
              bun)              tools="$tools,Bash(bun:*),Bash(bunx:*)" ;;
            esac
            [ "$NODE" = "true" ]       && tools="$tools,Bash(node:*),Bash(npm:*)"
            [ "$CONTEXT7" = "true" ]   && tools="$tools,mcp__context7"
            [ "$BROWSER" = "true" ] && tools="$tools,mcp__playwright"
            [ -n "$EXTRA_TOOLS" ]      && tools="$tools,$EXTRA_TOOLS"
          fi

          if [ "$EVENT" = "workflow_dispatch" ]; then
            tools="$tools,Edit,Write,MultiEdit"
          fi

          echo "tools=$tools" >> "$GITHUB_OUTPUT"
          if [ "$servers" = "{}" ]; then
            echo "mcp_arg=" >> "$GITHUB_OUTPUT"
          else
            echo "mcp_arg=--mcp-config '{\"mcpServers\":$servers}'" >> "$GITHUB_OUTPUT"
          fi

      - name: Load shared bot instructions
        id: instr
        uses: inference-gateway/.github/.github/actions/bot-instructions@main

      - name: Compose prompt
        id: prompt
        env:
          EVENT: ${{ github.event_name }}
          USER_PROMPT: ${{ inputs.prompt }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
          BOARD: ${{ steps.instr.outputs.board }}
          FOLLOWUPS: ${{ steps.instr.outputs.followups }}
          STYLE: ${{ steps.instr.outputs.style }}
          ESCALATION: ${{ steps.instr.outputs.escalation }}
          BROWSER: ${{ steps.browser.outputs.enabled }}
        run: |
          set -euo pipefail

          case "$EVENT" in
            issues)                                          context=issue ;;
            pull_request_review|pull_request_review_comment) context=pr ;;
            issue_comment) if [ "$IS_PR_COMMENT" = "true" ]; then context=pr; else context=issue; fi ;;
            *)                                               context=task ;;
          esac

          common="$(cat <<'RULES'
          **COMMIT RULES:**
          - Do NOT add "Co-authored-by" lines to commits
          - Do NOT add "Generated with Claude Code" or similar attributions
          - Keep commits clean and professional

          **OUTPUT RULES:**

          ## Commit Message Requirements (max 72 chars)
          - Use conventional commit format with lowercase type (e.g., "fix:", "feat:", "refactor:")
          RULES
          )"
          common="$(printf '%s\n\n%s\n\n%s' "$common" "$STYLE" "$ESCALATION")"
          if [ "$BROWSER" = "true" ]; then
            common="$(printf '%s\n\n%s' "$common" "**BROWSER:** A headless-Chromium browser MCP server (mcp__playwright) is available this run - use it to navigate, inspect, screenshot, or verify live web pages when the task calls for a real browser.")"
          fi

          if [ "$context" = "issue" ]; then
          pr_block="$(cat <<'ISSUE'
          Implement the change and commit it, then open the pull request:
          ```
          gh pr create --title "Your descriptive title" --body "## Summary
          Your summary of what was implemented.

          Closes #__N__"
          ```
          Always include a summary of changes AND "Closes #__N__" in the body.
          ISSUE
          )"
          body="$(printf '%s\n\n%s\n\n%s' "$BOARD" "$FOLLOWUPS" "$pr_block")"
          body="${body//__N__/$ISSUE_NUMBER}"
          elif [ "$context" = "pr" ]; then
          body="$(cat <<'PR'
          **WHEN WORKING ON PR FEEDBACK:**
          Make the requested changes and commit. The PR will automatically update - do NOT open a new PR.

          **WHEN FIXING CI FAILURES:**
          Fix the issues, commit the fix. The CI will automatically re-run.
          PR
          )"
          else
          body="$(printf '%s\n\n%s' "$USER_PROMPT" "If your work changes files, commit them on a new branch and open a pull request - do NOT push to the default branch.")"
          fi

          {
            echo 'text<<__CLAUDE_PROMPT_EOF__'
            printf '%s\n\n%s\n' "$body" "$common"
            echo '__CLAUDE_PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

          echo "::group::Composed prompt (context=$context)"
          printf '%s\n\n%s\n' "$body" "$common"
          echo "::endgroup::"

      - name: Sync memory in (restore .memory@claude)
        id: memory-sync-in
        if: inputs.memory
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -uo pipefail
          MEM_DIR="$HOME/.claude/memory"
          remote="https://x-access-token:${TOKEN}@github.com/inference-gateway/.memory.git"
          if git clone --depth 1 --single-branch --branch claude "$remote" "$MEM_DIR" 2>/dev/null; then
            echo "Restored existing memory from .memory@claude."
          else
            echo "No .memory@claude branch yet; starting a fresh memory store."
            rm -rf "$MEM_DIR"; mkdir -p "$MEM_DIR"
            git -C "$MEM_DIR" init -q -b claude
            git -C "$MEM_DIR" remote add origin "$remote"
          fi
          settings="$(jq -cn --arg d "$MEM_DIR" '{autoMemoryDirectory: $d}')"
          { echo "settings=$settings"; echo "dir=$MEM_DIR"; } >> "$GITHUB_OUTPUT"
          echo "Auto-memory relocated to: $MEM_DIR"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1.0.168
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          settings: ${{ steps.memory-sync-in.outputs.settings }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          display_report: true
          show_full_output: ${{ inputs.debug }}
          additional_permissions: |
            actions: read
          use_commit_signing: ${{ github.event_name != 'workflow_dispatch' }}
          base_branch: main
          branch_prefix: ${{ steps.prefix.outputs.value }}
          claude_args: |
            --effort ${{ inputs.effort }}
            --model ${{ inputs.model }}
            --allowedTools "${{ steps.args.outputs.tools }}"
            ${{ steps.args.outputs.mcp_arg }}
            ${{ inputs.debug && '--debug' || '' }}
          prompt: ${{ steps.prompt.outputs.text }}
          track_progress: ${{ github.event_name != 'workflow_dispatch' }}

      - name: Sync memory out (persist to .memory@claude)
        if: ${{ always() && inputs.memory }}
        run: |
          set -uo pipefail
          MEM_DIR="$HOME/.claude/memory"
          if [ ! -d "$MEM_DIR/.git" ]; then
            echo "Memory: no store initialized, nothing to sync." >> "$GITHUB_STEP_SUMMARY"; exit 0
          fi
          git -C "$MEM_DIR" add -A
          if git -C "$MEM_DIR" diff --cached --quiet; then
            echo "Memory: no changes to sync." >> "$GITHUB_STEP_SUMMARY"; exit 0
          fi
          git -C "$MEM_DIR" commit -q -m "chore(memory): sync from ${GITHUB_REPOSITORY} (run ${GITHUB_RUN_ID})"
          if git -C "$MEM_DIR" push origin HEAD:claude 2>/dev/null; then
            echo "Memory: synced to \`.memory@claude\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Memory push to .memory@claude failed (best-effort); not persisted this run."
            echo "Memory: push failed (best-effort), not persisted this run." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Preserve work-in-progress on cancel or failure
        if: cancelled() || failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PREFIX: ${{ steps.prefix.outputs.value }}
          ISSUE: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_ID: ${{ github.run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No uncommitted changes to preserve."
            exit 0
          fi
          wip="${PREFIX}wip-${ISSUE:-$RUN_ID}"
          git switch -c "$wip"
          git add -A
          git commit -m "wip: partial work from an unfinished agent run [skip ci]"
          if ! git push -u origin "$wip"; then
            echo "Push rejected; the work remains in this run's --debug log for manual recovery."
            exit 0
          fi
          echo "Preserved working tree on branch: $wip"
          [ -n "$ISSUE" ] || exit 0
          body="$(printf 'Auto-saved partial work from a run that was cancelled before it finished (timed out or failed). For #%s - a maintainer can review this branch and continue it; there is no automatic resume.\n\nRun: %s' "$ISSUE" "$RUN_URL")"
          gh pr create --draft --base "$DEFAULT_BRANCH" --head "$wip" \
            --title "wip: ${ISSUE_TITLE:-partial work} (run did not finish)" --body "$body" \
            || echo "Draft PR not created (one may already exist)."
