---
name: Cleanup workflow runs

# Daily sweep across EVERY repos.yaml target (select(true), all kinds including
# kind: none). For each repo, deletes
# completed workflow runs whose conclusion is in the `conclusions` input
# (default `skipped`), honoring a per-repo `keep_last` retention floor.
# inference-gateway/infer-action (@infer) and anthropics/claude-code-action
# (@claude) fire on every issues / issue_comment event and then skip at the
# job-level `if:` guard, leaving runs with status: completed, conclusion:
# skipped. GitHub has no native auto-prune, so they accumulate and bury
# meaningful runs in each repo's Actions tab.
#
# Scope: every registered repos.yaml target, including the infra/tooling repos
# (kind: none - inference-gateway, cli, operator, registry, ...). Private repos
# are never registered in repos.yaml, so they are excluded by construction. This
# intentionally diverges from stale.yml, which still exempts kind: none
# (select(.kind != "none")) so infra issue trackers are not auto-staled.
#
# Auth: per-target scoped App token via inference-gateway-maintainer-bot (needs
# actions: write on each target - already granted; trigger-cd.yml dispatches
# cd.yml on agent targets using the same scope). The default GITHUB_TOKEN is
# scoped to .github only and cannot delete runs in other repos.
#
# Safety: deletion is gated by the `conclusions` set (default `skipped` =
# today's behavior) and an optional `keep_last` retention floor (protects the
# newest N runs in the repo). A per-run re-check immediately before each
# delete re-confirms status: completed and conclusion in the set, so an
# in_progress/queued run is never deleted. A MAX_DELETES cap bounds a single
# run and logs a warning with the leftover count. dry_run lists/counts without
# deleting; manual dispatch previews by default, the scheduled run deletes.
#
# keep_last is per REPO: it protects the newest N runs across the whole repo,
# regardless of workflow. Only runs of workflows whose file still exists are
# eligible for that floor - runs of a deleted/renamed workflow are pruned in FULL
# (otherwise keep_last would preserve a tail for a workflow that no longer exists).
#
# Fail-loud: every listing/re-check/delete is rate-limit aware. All matrix jobs
# share ONE App installation token (a single 5,000-req/hr bucket), so a large
# `conclusions=all` purge across many repos can exhaust it mid-sweep. Rather than
# the old behavior - a 403 on the listing yielding a false "found 0" and a green
# check - the job now exits non-zero with an ::error:: and the leftover count.
# Deletions are idempotent, so a capped/rate-limited run is resumed simply by
# rerunning (or by the next daily cron); narrow with `repository=<name>` to purge
# one repo at a time and stay within the shared budget.

on:
  # Enable after validating on one repo (see README rollout procedure).
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List/count matching runs without deleting (manual runs preview by default)'
        required: false
        type: boolean
        default: true
      conclusions:
        description: 'Space/comma-separated run conclusions to delete (e.g. skipped, "skipped,failure", "failure,cancelled"). "all" = any conclusion. Default = the skipped-only sweep.'
        required: false
        type: string
        default: 'skipped'
      keep_last:
        description: 'Protect the newest N runs in the repo from deletion (retention floor). 0 = no protection.'
        required: false
        type: string
        default: '5'
      repository:
        description: 'Single repos.yaml target to sweep (omit = all targets). Use to test on one repo.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: cleanup-runs
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
    steps:
      - uses: actions/checkout@v7.0.1
      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: 'true'
          repository: ${{ inputs.repository }}

  cleanup:
    needs: matrix
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Validate inputs
        env:
          KEEP_LAST: ${{ inputs.keep_last || '0' }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$KEEP_LAST" | grep -qE '^[0-9]+$'; then
            echo "::error::keep_last must be a non-negative integer, got: ${KEEP_LAST}"
            exit 1
          fi

      - name: Mint App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Cleanup workflow runs in inference-gateway/${{ matrix.target.name }}
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          GH_REPO: inference-gateway/${{ matrix.target.name }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CONCLUSIONS: ${{ inputs.conclusions || 'skipped' }}
          KEEP_LAST: ${{ inputs.keep_last || '0' }}
          SLEEP_BETWEEN_DELETES: '1'
          MAX_DELETES: '500'
        run: |
          set -euo pipefail

          # Build the conclusion filter. "all" => match any conclusion (jq null).
          if [ "${CONCLUSIONS}" = "all" ]; then
            CONCLS_JSON='null'
          else
            CONCLS_JSON=$(printf '%s' "${CONCLUSIONS}" | tr ',' ' ' | tr -s ' ' '\n' | grep -v '^$' | jq -R . | jq -s -c .)
          fi

          {
            echo "### ${GH_REPO}"
            echo
            echo "- dry run: \`${DRY_RUN}\`"
            echo "- conclusions: \`${CONCLUSIONS}\`"
            echo "- keep last (per repo): \`${KEEP_LAST}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if ! active_json=$(
            gh api "repos/${GH_REPO}/actions/workflows" --paginate \
              --jq '.workflows[].id' | jq -s -c .
          ); then
            echo "::error::failed to list workflows in ${GH_REPO} (rate limit or transient); aborting without deleting"
            gh api rate_limit --jq '.resources.core' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            exit 1
          fi

          if ! candidates=$(
            gh api "repos/${GH_REPO}/actions/runs?status=completed&per_page=100" \
              --paginate \
              --jq '.workflow_runs[] | {id, workflow_id, created_at, conclusion}' \
            | jq -s -c \
                --argjson keep "${KEEP_LAST}" \
                --argjson concls "${CONCLS_JSON}" \
                --argjson active "${active_json}" '
                  ([.[] | select(.workflow_id as $w | $active | index($w) != null)]
                    | sort_by(.created_at) | reverse | .[$keep:])
                  + [.[] | select(.workflow_id as $w | $active | index($w) == null)]
                  | map(select($concls == null or (.conclusion as $c | $concls | index($c) != null)))
                  | .[].id
                '
          ); then
            echo "::error::failed to list runs in ${GH_REPO} (rate limit or transient); aborting without deleting"
            gh api rate_limit --jq '.resources.core' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            exit 1
          fi
          mapfile -t run_ids < <(printf '%s\n' "${candidates}" | grep -v '^$' || true)
          found=${#run_ids[@]}
          echo "Found ${found} matching run(s) in ${GH_REPO}"
          echo "- found: ${found}" >> "$GITHUB_STEP_SUMMARY"

          deleted=0
          capped=0
          for id in "${run_ids[@]}"; do
            if [ "${DRY_RUN}" = "true" ]; then
              echo "  [DRY] would delete run ${id}"
              continue
            fi
            if [ "${deleted}" -ge "${MAX_DELETES}" ]; then
              capped=1
              break
            fi

            meta=$(gh api "repos/${GH_REPO}/actions/runs/${id}" --jq '"\(.status) \(.conclusion)"' 2>/dev/null) || meta=""
            if [ -z "${meta}" ]; then
              remaining=$(gh api rate_limit --jq '.resources.core.remaining' 2>/dev/null || echo unknown)
              if [ "${remaining}" = "0" ]; then
                echo "::error::rate limit exhausted in ${GH_REPO}; deleted ${deleted}, $((found - deleted)) candidate(s) left. Rerun (or wait for cron) to continue."
                exit 1
              fi
              echo "  skip run ${id}: re-check failed (transient; next run retries)"
              continue
            fi
            read -r st concl <<< "${meta}"
            if [ "${st}" != "completed" ]; then
              echo "  skip run ${id}: status='${st}' (not completed)"
              continue
            fi
            if [ "${CONCLUSIONS}" != "all" ] && ! printf '%s' "${CONCLS_JSON}" | jq -e --arg c "${concl}" 'index($c) != null' >/dev/null; then
              echo "  skip run ${id}: conclusion='${concl}' (not in set)"
              continue
            fi

            if gh api -X DELETE "repos/${GH_REPO}/actions/runs/${id}" >/dev/null 2>&1; then
              deleted=$((deleted + 1))
            else
              remaining=$(gh api rate_limit --jq '.resources.core.remaining' 2>/dev/null || echo unknown)
              if [ "${remaining}" = "0" ]; then
                echo "::error::rate limit exhausted in ${GH_REPO}; deleted ${deleted}, $((found - deleted)) candidate(s) left. Rerun (or wait for cron) to continue."
                exit 1
              fi
              echo "::warning::failed to delete run ${id} in ${GH_REPO} (transient; next run retries)"
            fi
            sleep "${SLEEP_BETWEEN_DELETES}"
          done

          if [ "${capped}" -eq 1 ]; then
            echo "::warning::hit MAX_DELETES=${MAX_DELETES} cap in ${GH_REPO}; ${found} matched, $((found - deleted)) left for the next run"
            echo "- capped at: \`${MAX_DELETES}\` (next run continues)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${DRY_RUN}" = "true" ]; then
            echo "- would delete: ${found}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Deleted ${deleted} run(s); $((found - deleted)) matched run(s) not deleted this run"
            {
              echo "- deleted: ${deleted}"
              echo "- remaining (matched, undeleted): $((found - deleted))"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          echo >> "$GITHUB_STEP_SUMMARY"
