---
name: Infer (reusable)

# Reusable @infer bot workflow for the inference-gateway org.
#
# Single source of truth for the per-repo `.github/workflows/infer.yml` thin caller. Wraps
# inference-gateway/infer-action (the gateway-powered issue/comment agent). A fix here (action
# bump, model change, tool scope) is one commit + a tag move instead of one PR per repo.
#
# Caller contract:
#   jobs.infer.uses: inference-gateway/.github/.github/workflows/infer.yml@v1
# The `on:` triggers and the `@infer` gate `if:` stay in the caller (event triggers cannot live in
# a reusable workflow, and keeping the gate on the caller job avoids spinning up this runner for
# every non-@infer comment).
#
# The `custom-instructions` (board-tracking, follow-up issues, writing style, and permission-
# escalation) come from the shared `inference-gateway/.github/.github/actions/bot-instructions`
# composite action, so that prompt text is maintained ONCE and shared with the reusable
# claude.yml. They are composed PER TRIGGER (mirroring claude.yml's "Compose prompt" context
# resolution): board.md only applies to issue-triggered work, so PR-comment and
# workflow_dispatch runs drop it instead of carrying ~350 dead tokens; escalation stays last.
#
# Tools model: infer-action v0.12.0+ owns the read-only bash allow baseline (file reads, read-only
# git/gh, gh project reads) plus, when git ops are on, the PR-workflow writes (git add/commit/push,
# gh pr create). The `language` preset + `markdownlint` + `extra-bash-commands` append the toolchain
# commands this repo needs, and `extra-bash-patterns` appends raw regex entries (e.g. to allow
# `gh issue create`) per repo. This workflow ALSO appends, unconditionally, the GitHub writes the
# bot's board-tracking + permission-escalation flow always needs (`gh issue create/edit/comment`,
# `gh project item-add/item-edit`, `gh pr create`, plus one tightly scoped `gh api graphql` entry that
# allows ONLY the `updateIssueIssueType` Type-setting mutation - never arbitrary GraphQL).
# Every appended entry is matched WHOLE-command by the CLI
# (\A(?:entry)\z), so it must allow its own arguments: write `^task( .*)?$`, not `^task( |$)` (the
# latter only matches the bare command, rejecting `task lint`).

on:
  workflow_call:
    inputs:
      language:
        description: 'Toolchain preset: go | rust | typescript | node | python | bun | none'
        type: string
        default: none
      runner:
        description: 'Runner image'
        type: string
        default: ubuntu-24.04
      skills:
        description: 'Newline-separated org skills to install (infer-action `skills`). Default none - the board-tracking + issue procedure is inlined in custom-instructions below, so no skill is required.'
        type: string
        default: ''
      plugins:
        description: 'Newline-separated org plugins to install (infer-action `plugins`). Default none.'
        type: string
        default: ''
      model:
        description: 'Model id passed to infer-action (provider/model)'
        type: string
        default: ollama_cloud/deepseek-v4-flash
      prompt:
        description: 'Free-text task for manual (workflow_dispatch) runs. Empty = issue/comment mode (task comes from the @infer comment).'
        type: string
        default: ''
      cli-version:
        description: 'infer CLI version installed by infer-action (must be a release with published binaries)'
        type: string
        default: v0.146.0
      trigger-phrase:
        description: 'Mention that activates the bot'
        type: string
        default: '@infer'
      compact-auto-at:
        description: 'Auto-compact the conversation at this percent of the context window'
        type: string
        default: '50'
      debug:
        description: 'Enable infer-action debug logging AND mirror the agent stdout transcript to the run log (mirror-agent-logs). Defaults false; turn on per-repo via repos.yaml for verbose agent logs (private repos only - the mirrored transcript can include sensitive values).'
        type: boolean
        default: false
      markdownlint:
        description: 'Install markdownlint-cli and add markdownlint to the bash whitelist'
        type: boolean
        default: false
      prettier:
        description: 'Install prettier and add prettier to the bash whitelist'
        type: boolean
        default: false
      eslint:
        description: 'Install eslint and add eslint to the bash whitelist'
        type: boolean
        default: false
      precommit:
        description: 'Install pre-commit and run `task precommit:install`'
        type: boolean
        default: false
      node:
        description: 'Force Node/pnpm setup even when language is not typescript/node'
        type: boolean
        default: false
      extra-bash-commands:
        description: 'Comma-separated bare commands appended to the language-derived bash allow list. Each is wrapped as a Go regex anchored to the whole command, e.g. "helm" becomes "^helm( .*)?$".'
        type: string
        default: ''
      extra-bash-patterns:
        description: 'Comma-separated Go regex patterns appended to the bash allow list (maps to infer-action bash-allow-append). Prefix-anchored against the full command, e.g. "^gh issue create( .*)?$".'
        type: string
        default: ''
    secrets:
      INFERENCE_GATEWAY_MAINTAINER_APP_ID:
        description: 'Client ID of the @infer bot GitHub App (callers use `secrets: inherit`)'
        required: true
      INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY:
        description: 'Private key of the @infer bot GitHub App (callers use `secrets: inherit`)'
        required: true

permissions:
  contents: read

jobs:
  infer:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
            .github
            .memory
            python-sdk
            typescript-sdk
            rust-sdk
            sdk
            docs
            adk
            rust-adk
            typescript-adk
            browser-agent
            documentation-agent
            google-calendar-agent
            grafana-agent
            mock-agent
            n8n-agent
            cli
            a2a-debugger
            adl-cli
            adl
            inference-gateway
            infer-action
            operator
            registry
            schemas
            skills
            agents

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Set up Git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git config --global commit.gpgsign false
          git config --global commit.signoff true

      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout PR head branch
        if: >
          (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
          github.event_name == 'pull_request_review_comment' ||
          github.event_name == 'pull_request_review'
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR="${{ github.event.issue.number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi
          # A merged/closed PR's head branch may be deleted; stay on the
          # default branch (it already contains the merged work).
          if [ "$(gh pr view "$PR" --json state -q .state)" = "OPEN" ]; then
            gh pr checkout "$PR"
          else
            echo "PR #$PR is not open; staying on the default branch"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Install task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.48.0
          repo-token: ${{ steps.app-token.outputs.token }}

      - name: Install Flox
        uses: flox/install-flox-action@v2.5.3
        with:
          version: "1.13.0"

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint
        if: inputs.language == 'go'
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2
          install-only: true

      - name: Set up Rust
        if: inputs.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          components: clippy, rustfmt

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.x'

      - name: Set up Bun
        if: inputs.language == 'bun'
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install repo dependencies
        if: inputs.language == 'bun' && hashFiles('bun.lock') != ''
        run: bun install --frozen-lockfile

      - name: Set up pnpm
        if: inputs.language == 'typescript' || inputs.language == 'node' || inputs.node || inputs.markdownlint || inputs.prettier || inputs.eslint
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.18.0
          run_install: false

      - name: Set up Node.js
        if: inputs.language == 'typescript' || inputs.language == 'node' || inputs.node || inputs.markdownlint || inputs.prettier || inputs.eslint
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 'lts/*'

      - name: Install markdownlint
        if: inputs.markdownlint
        run: npm install -g markdownlint-cli

      - name: Install prettier
        if: inputs.prettier
        run: npm install -g prettier

      - name: Install eslint
        if: inputs.eslint
        run: npm install -g eslint

      - name: Install pre-commit
        if: inputs.precommit
        run: |
          set -euo pipefail
          pip install pre-commit
          task precommit:install

      - name: Compose bash allow append
        id: whitelist
        env:
          LANGUAGE: ${{ inputs.language }}
          MARKDOWNLINT: ${{ inputs.markdownlint }}
          PRETTIER: ${{ inputs.prettier }}
          ESLINT: ${{ inputs.eslint }}
          NODE: ${{ inputs.node }}
          EXTRA: ${{ inputs.extra-bash-commands }}
          EXTRA_PATTERNS: ${{ inputs.extra-bash-patterns }}
        run: |
          set -euo pipefail
          patterns='^task( .*)?$'
          case "$LANGUAGE" in
            go)               patterns="$patterns,^go( .*)?$" ;;
            rust)             patterns="$patterns,^cargo( .*)?$,^rustup( .*)?$,^rustc( .*)?$" ;;
            python)           patterns="$patterns,^python( .*)?$,^python3( .*)?$" ;;
            typescript|node)  patterns="$patterns,^node( .*)?$,^npm( .*)?$,^pnpm( .*)?$,^npx( .*)?$,^prettier( .*)?$" ;;
            bun)              patterns="$patterns,^bun install( .*)?$,^bun add( .*)?$,^bun remove( .*)?$,^bun update( .*)?$,^bun run( .*)?$,^bun test( .*)?$,^bun build( .*)?$" ;;
          esac
          [ "$NODE" = "true" ]         && patterns="$patterns,^node( .*)?$,^npm( .*)?$,^pnpm( .*)?$,^npx( .*)?$,^prettier( .*)?$"
          [ "$MARKDOWNLINT" = "true" ] && patterns="$patterns,^node( .*)?$,^npm( .*)?$,^pnpm( .*)?$,^npx( .*)?$,^prettier( .*)?$,^markdownlint( .*)?$"
          [ "$PRETTIER" = "true" ] && patterns="$patterns,^prettier( .*)?$"
          [ "$ESLINT" = "true" ] && patterns="$patterns,^eslint( .*)?$"
          patterns="$patterns,^gh issue create( .*)?$,^gh issue edit( .*)?$,^gh issue comment( .*)?$,^gh pr create( .*)?$,^gh project (item-add|item-edit)( .*)?$"
          gql='^gh api graphql -f query='\''mutation\(\$id:ID!\x2c\$t:ID!\)\{updateIssueIssueType\(input:\{issueId:\$id\x2cissueTypeId:\$t\}\)\{issue\{number issueType\{name\}\}\}\}'\'' -f id="[^"]+" -f t="IT_[A-Za-z0-9_-]+"$'
          patterns="$patterns,$gql"
          if [ -n "$EXTRA" ]; then
            IFS=',' read -ra extra_cmds <<< "$EXTRA"
            for cmd in "${extra_cmds[@]}"; do
              cmd="${cmd## }"
              cmd="${cmd%% }"
              [ -n "$cmd" ] && patterns="$patterns,^${cmd}( .*)?$"
            done
          fi
          [ -n "$EXTRA_PATTERNS" ] && patterns="$patterns,$EXTRA_PATTERNS"
          echo "patterns=$patterns" >> "$GITHUB_OUTPUT"
          echo "Bash allow append: $patterns"

      - name: Load shared bot instructions
        id: instr
        uses: inference-gateway/.github/.github/actions/bot-instructions@main

      - name: Compose custom instructions
        id: custom
        env:
          EVENT: ${{ github.event_name }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
          BOARD: ${{ steps.instr.outputs.board }}
          FOLLOWUPS: ${{ steps.instr.outputs.followups }}
          STYLE: ${{ steps.instr.outputs.style }}
          RELEASES: ${{ steps.instr.outputs.releases }}
          SANDBOX: ${{ steps.instr.outputs.sandbox }}
          ESCALATION: ${{ steps.instr.outputs.escalation }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "issues" ] || { [ "$EVENT" = "issue_comment" ] && [ "$IS_PR_COMMENT" != "true" ]; }; then
            text="$(printf '%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s' "$BOARD" "$FOLLOWUPS" "$STYLE" "$RELEASES" "$SANDBOX" "$ESCALATION")"
          else
            text="$(printf '%s\n\n%s\n\n%s\n\n%s\n\n%s' "$FOLLOWUPS" "$STYLE" "$RELEASES" "$SANDBOX" "$ESCALATION")"
          fi
          printf 'text<<__CI_EOF__\n%s\n__CI_EOF__\n' "$text" >> "$GITHUB_OUTPUT"

      - name: Resolve subscription mode
        id: subscription
        env:
          USER_PROMPT: ${{ inputs.prompt }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -euo pipefail
          enabled=false
          model=""

          match="$(printf '%s\n%s\n%s\n%s\n%s\n' \
                    "$USER_PROMPT" "$ISSUE_TITLE" "$ISSUE_BODY" "$COMMENT_BODY" "$REVIEW_BODY" \
                  | grep -oiE '/subscription[[:space:]]+anthropic/[^[:space:]]+' || true)"
          if [ -n "$match" ]; then
            enabled=true
            model="$(printf '%s' "$match" | sed -E 's|^.*anthropic/||I')"
          fi
          echo "Subscription mode enabled: $enabled"
          [ "$enabled" = "true" ] && echo "Resolved model: $model"
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "model=$model" >> "$GITHUB_OUTPUT"

      - name: Run Infer Agent
        uses: inference-gateway/infer-action@v0.32.1
        with:
          version: ${{ inputs.cli-version }}
          memory-repo: https://github.com/inference-gateway/.memory
          github-token: ${{ steps.app-token.outputs.token }}
          github-app-slug: ${{ steps.app-token.outputs.app-slug }}
          trigger-phrase: ${{ inputs.trigger-phrase }}
          model: ${{ steps.subscription.outputs.enabled == 'true' && steps.subscription.outputs.model || inputs.model }}
          direct-prompt: ${{ inputs.prompt }}
          compact-auto-at: ${{ inputs.compact-auto-at }}
          debug: ${{ inputs.debug }}
          mirror-agent-logs: ${{ inputs.debug }}
          skills: ${{ inputs.skills }}
          plugins: ${{ inputs.plugins }}
          custom-instructions: ${{ steps.custom.outputs.text }}
          bash-allow-append: ${{ steps.whitelist.outputs.patterns }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          deepseek-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}
          cloudflare-api-key: ${{ secrets.CLOUDFLARE_API_KEY }}
          cohere-api-key: ${{ secrets.COHERE_API_KEY }}
          ollama-api-key: ${{ secrets.OLLAMA_API_KEY }}
          ollama-cloud-api-key: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          moonshot-api-key: ${{ secrets.MOONSHOT_API_KEY }}
          minimax-api-key: ${{ secrets.MINIMAX_API_KEY }}
          nvidia-api-key: ${{ secrets.NVIDIA_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
