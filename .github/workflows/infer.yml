---
name: Infer (reusable)

# Reusable @infer bot workflow for the inference-gateway org.
#
# Single source of truth for the per-repo `.github/workflows/infer.yml` thin caller. Wraps
# inference-gateway/infer-action (the gateway-powered issue/comment agent). A fix here (action
# bump, model change, tool scope) is one commit + a tag move instead of one PR per repo.
#
# Caller contract:
#   jobs.infer.uses: inference-gateway/.github/.github/workflows/infer.yml@v1
# The `on:` triggers and the `@infer` gate `if:` stay in the caller (event triggers cannot live in
# a reusable workflow, and keeping the gate on the caller job avoids spinning up this runner for
# every non-@infer comment).
#
# Tools model: infer-action v0.12.0+ owns the read-only bash allow baseline (file reads, read-only
# git/gh, gh project reads) plus, when git ops are on, the PR-workflow writes (git add/commit/push,
# gh pr create). The `language` preset + `markdownlint` + `extra-bash-commands` append the toolchain
# commands this repo needs, and `extra-bash-patterns` appends raw regex entries (e.g. to allow
# `gh issue create`) per repo. This workflow ALSO appends, unconditionally, the GitHub writes the
# bot's board-tracking + permission-escalation flow always needs (`gh issue create/edit/comment`,
# `gh project item-add/item-edit`, `gh pr create`, plus one tightly scoped `gh api graphql` entry that
# allows ONLY the `updateIssueIssueType` Type-setting mutation - never arbitrary GraphQL).
# Every appended entry is matched WHOLE-command by the CLI
# (\A(?:entry)\z), so it must allow its own arguments: write `^task( .*)?$`, not `^task( |$)` (the
# latter only matches the bare command, rejecting `task lint`).

on:
  workflow_call:
    inputs:
      language:
        description: 'Toolchain preset: go | rust | typescript | node | python | none'
        type: string
        default: none
      runner:
        description: 'Runner image'
        type: string
        default: ubuntu-24.04
      skills:
        description: 'Newline-separated org skills to install (infer-action `skills`). Default none - the board-tracking + issue procedure is inlined in custom-instructions below, so no skill is required.'
        type: string
        default: ''
      model:
        description: 'Model id passed to infer-action (provider/model)'
        type: string
        default: ollama_cloud/deepseek-v4-flash
      prompt:
        description: 'Free-text task for manual (workflow_dispatch) runs. Empty = issue/comment mode (task comes from the @infer comment).'
        type: string
        default: ''
      cli-version:
        description: 'infer CLI version installed by infer-action (must be a release with published binaries)'
        type: string
        default: v0.121.1
      trigger-phrase:
        description: 'Mention that activates the bot'
        type: string
        default: '@infer'
      compact-auto-at:
        description: 'Auto-compact the conversation at this percent of the context window'
        type: string
        default: '50'
      debug:
        description: 'Enable infer-action debug logging'
        type: boolean
        default: false
      markdownlint:
        description: 'Install markdownlint-cli and add markdownlint to the bash whitelist'
        type: boolean
        default: false
      precommit:
        description: 'Install pre-commit and run `task precommit:install`'
        type: boolean
        default: false
      node:
        description: 'Force Node/pnpm setup even when language is not typescript/node'
        type: boolean
        default: false
      extra-bash-commands:
        description: 'Comma-separated bare commands appended to the language-derived bash allow list. Each is wrapped as a Go regex anchored to the whole command, e.g. "helm" becomes "^helm( .*)?$".'
        type: string
        default: ''
      extra-bash-patterns:
        description: 'Comma-separated Go regex patterns appended to the bash allow list (maps to infer-action bash-allow-append). Prefix-anchored against the full command, e.g. "^gh issue create( .*)?$".'
        type: string
        default: ''
    secrets:
      INFERENCE_GATEWAY_MAINTAINER_APP_ID:
        description: 'Client ID of the @infer bot GitHub App (callers use `secrets: inherit`)'
        required: true
      INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY:
        description: 'Private key of the @infer bot GitHub App (callers use `secrets: inherit`)'
        required: true

permissions:
  contents: read

jobs:
  infer:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
            .github

      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.48.0
          repo-token: ${{ steps.app_token.outputs.token }}

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Rust
        if: inputs.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          components: clippy, rustfmt

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Set up pnpm
        if: inputs.language == 'typescript' || inputs.language == 'node' || inputs.node || inputs.markdownlint
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.18.0
          run_install: false

      - name: Set up Node.js
        if: inputs.language == 'typescript' || inputs.language == 'node' || inputs.node || inputs.markdownlint
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install markdownlint
        if: inputs.markdownlint
        run: npm install -g markdownlint-cli

      - name: Install pre-commit
        if: inputs.precommit
        run: |
          set -euo pipefail
          pip install pre-commit
          task precommit:install

      - name: Compose bash allow append
        id: whitelist
        env:
          LANGUAGE: ${{ inputs.language }}
          MARKDOWNLINT: ${{ inputs.markdownlint }}
          NODE: ${{ inputs.node }}
          EXTRA: ${{ inputs.extra-bash-commands }}
          EXTRA_PATTERNS: ${{ inputs.extra-bash-patterns }}
        run: |
          set -euo pipefail
          patterns='^task( .*)?$'
          case "$LANGUAGE" in
            go)               patterns="$patterns,^go( .*)?$" ;;
            rust)             patterns="$patterns,^cargo( .*)?$,^rustup( .*)?$,^rustc( .*)?$" ;;
            python)           patterns="$patterns,^python( .*)?$,^python3( .*)?$" ;;
            typescript|node)  patterns="$patterns,^node( .*)?$,^npm( .*)?$,^pnpm( .*)?$,^npx( .*)?$,^prettier( .*)?$" ;;
          esac
          [ "$NODE" = "true" ]         && patterns="$patterns,^node( .*)?$,^npm( .*)?$,^pnpm( .*)?$,^npx( .*)?$,^prettier( .*)?$"
          [ "$MARKDOWNLINT" = "true" ] && patterns="$patterns,^node( .*)?$,^npm( .*)?$,^pnpm( .*)?$,^npx( .*)?$,^prettier( .*)?$,^markdownlint( .*)?$"
          patterns="$patterns,^gh issue create( .*)?$,^gh issue edit( .*)?$,^gh issue comment( .*)?$,^gh pr create( .*)?$,^gh project (item-add|item-edit)( .*)?$"
          gql='^gh api graphql -f query='\''mutation\(\$id:ID!\x2c\$t:ID!\)\{updateIssueIssueType\(input:\{issueId:\$id\x2cissueTypeId:\$t\}\)\{issue\{number issueType\{name\}\}\}\}'\'' -f id="[^"]+" -f t="IT_[A-Za-z0-9_-]+"$'
          patterns="$patterns,$gql"
          if [ -n "$EXTRA" ]; then
            IFS=',' read -ra extra_cmds <<< "$EXTRA"
            for cmd in "${extra_cmds[@]}"; do
              cmd="${cmd## }"
              cmd="${cmd%% }"
              [ -n "$cmd" ] && patterns="$patterns,^${cmd}( .*)?$"
            done
          fi
          [ -n "$EXTRA_PATTERNS" ] && patterns="$patterns,$EXTRA_PATTERNS"
          echo "patterns=$patterns" >> "$GITHUB_OUTPUT"
          echo "Bash allow append: $patterns"

      - name: Run Infer Agent
        uses: inference-gateway/infer-action@v0.15.0
        with:
          version: ${{ inputs.cli-version }}
          github-token: ${{ steps.app_token.outputs.token }}
          github-app-slug: ${{ steps.app_token.outputs.app-slug }}
          trigger-phrase: ${{ inputs.trigger-phrase }}
          model: ${{ inputs.model }}
          direct-prompt: ${{ inputs.prompt }}
          compact-auto-at: ${{ inputs.compact-auto-at }}
          debug: ${{ inputs.debug }}
          skills: ${{ inputs.skills }}
          custom-instructions: |
            When you are working on a GitHub issue (an issue trigger - not a PR comment
            or a manual/direct task), track the work on the org Roadmap 2026 board
            (GitHub org project #7) as you go. Use these org-stable ids verbatim - do not
            improvise:
            - project id `PVT_kwDOC6ve6c4BNnSt`, Status field id `PVTSSF_lADOC6ve6c4BNnStzg8jqxU`
            - Status option ids: In progress `47fc9ee4`, QA `0a18abd7` (Todo `f75ad846`, Done `98236657`)
            This CI shell disables command substitution `$(...)` and shell variables: run each
            command, read the id it prints, and paste that literal id into the next - never `ID=$(...)`.

            1. Before you change any code, add the issue you are working on to project #7
               and set Status = "In progress":
               - Get the issue URL: `gh issue view <number> --json url -q .url` (read it).
               - `gh project item-add 7 --owner inference-gateway --url <issue-url>`
                 (idempotent - if it is already on the board this just reports it exists, carry on).
               - Resolve its project-item id:
                 `gh project item-list 7 --owner inference-gateway --format json -L 1000 -q '.items[] | select(.content.url=="<issue-url>") | .id'`
               - Set Status = In progress (paste the item id):
                 `gh project item-edit --id <item-id> --project-id PVT_kwDOC6ve6c4BNnSt --field-id PVTSSF_lADOC6ve6c4BNnStzg8jqxU --single-select-option-id 47fc9ee4`
                 (if it is already on the board at another Status, just move it to In progress.)
            2. Implement the change, commit, and open the pull request as usual - include a
               summary of what you did AND "Closes #<number>" in the PR body.
            3. Right after the PR is open, move the issue's Status to "QA" (same item id):
               `gh project item-edit --id <item-id> --project-id PVT_kwDOC6ve6c4BNnSt --field-id PVTSSF_lADOC6ve6c4BNnStzg8jqxU --single-select-option-id 0a18abd7`
               Do NOT set Done - that happens when the PR merges, which is outside this run.

            Board tracking is best-effort: if a `gh project` call fails for lack of a GitHub
            permission, follow "IF A GITHUB PERMISSION IS MISSING" below, then carry on with
            the implementation and the PR - never abort the task over a board update.

            **IF A GITHUB PERMISSION IS MISSING:**
            If - and only if - a `gh`/`git` command fails because the bot LACKS a GitHub
            permission (HTTP 403 "Resource not accessible by integration", "does not have
            permission", "must have write/admin access", or a project/issue mutation rejected
            for authorization), file a tracking issue in `inference-gateway/.github` so a
            human can grant the scope. Do NOT do this for ordinary errors - a 404 (wrong URL),
            a 422 validation error, or a rate-limit 403 (transient) are not permission gaps;
            skip them.

            This is best-effort and must NEVER abort or block the real task. File the
            escalation, then continue (or, if the escalation itself fails, note it in your
            output and continue).

            Keep it to ONE issue org-wide per missing capability, not one per repo:
            - Title MUST be exactly `[bot] Missing GitHub permission: <capability>`, where
              <capability> is the short stable scope name, e.g. `organization projects
              (read & write)` or `issues: write on .github`.
            - Search first:
              `gh issue list --repo inference-gateway/.github --state open --search 'in:title "[bot] Missing GitHub permission: <capability>"'`
              - If one exists: add a COMMENT recording this occurrence (repo, issue/PR, run
                URL, error) and STOP - do not open a duplicate.
              - If none: `gh issue create --repo inference-gateway/.github --title "[bot] Missing GitHub permission: <capability>" --label bot --body ...`
                (if `--label bot` is rejected because the label is missing, retry without --label).

            The body MUST state: what you were doing, the originating repo and issue/PR, the
            Actions run URL ($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID),
            the exact permission needed and where to grant it (the maintainer GitHub App's
            installation -> Organization permissions -> Projects: Read and write, or the
            specific repo permission), and the verbatim error line.

            NEVER write `@claude` or `@infer` anywhere in the title, body, or comment, and do
            not add the escalation issue to the Roadmap board.
          bash-allow-append: ${{ steps.whitelist.outputs.patterns }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          deepseek-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}
          cloudflare-api-key: ${{ secrets.CLOUDFLARE_API_KEY }}
          cohere-api-key: ${{ secrets.COHERE_API_KEY }}
          ollama-api-key: ${{ secrets.OLLAMA_API_KEY }}
          ollama-cloud-api-key: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          moonshot-api-key: ${{ secrets.MOONSHOT_API_KEY }}
