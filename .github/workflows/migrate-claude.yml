name: Migrate claude.yml to reusable workflow

# One-shot fan-out: rewrites each claude_targets repo's standalone
# .github/workflows/claude.yml into a thin caller of the org reusable workflow
# (.github/.github/workflows/claude.yml) and opens a PR per repo.
#
# Reads `claude_targets` from repos.yaml (NOT `targets` — that list drives the
# sync/stale sweeps; the bot set is broader and lives separately). The 6
# kind=agent repos are intentionally excluded: their claude.yml is generated by
# adl-cli and migrates via the generator + bump-adl.yml.
#
# App scope required on each target: contents:write, pull-requests:write,
# workflows:write (this writes a file under .github/workflows/).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Reusable workflow ref to pin callers to. Blank = the latest .github release tag.'
        required: false
        type: string
        default: ''
      repository:
        description: 'Optional single claude_targets name to migrate (for testing); blank = all'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Render + print the diff but skip PR creation'
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve reusable-workflow ref
        id: ref
        env:
          REF_IN: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$REF_IN" ]; then
            ref="$REF_IN"
          else
            ref=$(gh release view --repo inference-gateway/.github --json tagName --jq .tagName)
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "::notice::Callers will pin inference-gateway/.github/.github/workflows/claude.yml@${ref}"

      - id: read
        env:
          ONLY: ${{ inputs.repository }}
        run: |
          set -euo pipefail
          all=$(yq -o=json -I=0 '.claude_targets' repos.yaml)
          if [ -n "$ONLY" ]; then
            targets=$(echo "$all" | jq -c --arg n "$ONLY" '[.[] | select(.name == $n)]')
            if [ "$(echo "$targets" | jq 'length')" -eq 0 ]; then
              echo "::error::repository '$ONLY' not found in claude_targets"
              exit 1
            fi
          else
            targets="$all"
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  migrate:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    concurrency:
      group: migrate-claude-${{ matrix.target.name }}
      cancel-in-progress: false
    steps:
      - name: Mint GitHub App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.BOT_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.BOT_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v6.0.2
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Render thin caller
        working-directory: target
        env:
          TARGET_JSON: ${{ toJSON(matrix.target) }}
          REF: ${{ needs.matrix.outputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p .github/workflows

          # Build the `with:` block from every field except `name`; strings
          # quoted, booleans/numbers bare. Keys map 1:1 to reusable inputs.
          with_block=$(echo "$TARGET_JSON" | jq -r '
            to_entries
            | map(select(.key != "name"))
            | map("      \(.key): \(.value | if type == "string" then "\"\(.)\"" else tostring end)")
            | .[]')

          {
            cat <<'HEADER'
          ---
          name: Claude Code

          # Thin caller for the org-wide reusable @claude workflow.
          # Source of truth: inference-gateway/.github/.github/workflows/claude.yml
          # Inputs are managed centrally in inference-gateway/.github/repos.yaml (claude_targets).
          # Do not hand-edit setup here; change the reusable workflow or repos.yaml instead.

          on:
            issue_comment:
              types:
                - created
            pull_request_review_comment:
              types:
                - created
            issues:
              types:
                - opened
                - assigned
            pull_request_review:
              types:
                - submitted

          jobs:
            claude:
              if: |
                (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
                (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
                (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
                (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
              # A called workflow's GITHUB_TOKEN is capped by the caller, so grant here.
              permissions:
                contents: write
                pull-requests: write
                issues: write
                id-token: write
                actions: read
          HEADER
            echo "    uses: inference-gateway/.github/.github/workflows/claude.yml@${REF}"
            echo "    with:"
            echo "$with_block"
            echo "    secrets: inherit"
          } > .github/workflows/claude.yml

          echo "::group::Rendered .github/workflows/claude.yml"
          cat .github/workflows/claude.yml
          echo "::endgroup::"

      - name: Show diff
        working-directory: target
        run: |
          git -c color.ui=always diff --stat -- .github/workflows/claude.yml || true
          if git diff --quiet -- .github/workflows/claude.yml; then
            echo "::notice::${{ matrix.target.name }}: no change (already migrated)"
          fi

      - name: Create or update pull request
        if: ${{ !inputs.dry_run }}
        id: pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.token.outputs.token }}
          path: target
          branch: bot/centralize-claude-workflow
          base: main
          sign-commits: true
          delete-branch: true
          add-paths: .github/workflows/claude.yml
          commit-message: "ci: centralize claude.yml via reusable workflow"
          title: "ci: centralize claude.yml via reusable workflow"
          body: |
            ## Summary
            Replaces this repo's standalone `.github/workflows/claude.yml` (~120 lines) with a thin
            caller of the org reusable workflow
            `inference-gateway/.github/.github/workflows/claude.yml@${{ needs.matrix.outputs.ref }}`.

            Behavior is preserved. Future fixes (effort, model, action versions, setup) become **one
            PR in `.github` + a tag move** instead of one PR per repo.

            ### Notes
            - `--effort` is `max` — the prior `ultracode` value was invalid and failed the claude CLI at
              argument-parse time (valid: `low|medium|high|xhigh|max`).
            - Tools = a shared default (`Bash(task:*),Bash(gh:*),Bash(git:*)`) + the language preset +
              this repo's extras, configured in `repos.yaml` `claude_targets`.
            - If this repo previously narrowed `gh` scope or used a quirky tool list, that is preserved
              via `allowed-tools`; otherwise the list is normalized (e.g. a stray `Bash(go:*)` on a
              non-Go repo is dropped).

            Filed by [migrate-claude.yml](https://github.com/inference-gateway/.github/blob/main/.github/workflows/migrate-claude.yml).
          labels: |
            ci

      - name: Report PR outcome
        if: ${{ !inputs.dry_run && steps.pr.outputs.pull-request-number != '' }}
        run: |
          {
            echo "### ${{ matrix.target.name }}"
            echo "- Operation: \`${{ steps.pr.outputs.pull-request-operation }}\`"
            echo "- PR: ${{ steps.pr.outputs.pull-request-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        working-directory: target
        run: |
          {
            echo "## Dry-run: ${{ matrix.target.name }}"
            echo '```diff'
            git diff -- .github/workflows/claude.yml || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
