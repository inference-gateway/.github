---
name: Migrate claude.yml to reusable workflow

# One-shot fan-out: per target repo it (1) writes .github/workflows/claude.yml as a thin caller of
# the org reusable workflow (.github/.github/workflows/claude.yml) and (2) bumps the target's OWN
# Flox claude-code pin (.flox/env/manifest.toml) to the latest flox-catalog version and refreshes
# the lock - then opens ONE PR carrying both. Unlike migrate-infer.yml there is no config-regen step
# (claude-code has no `init` analog), so `flox activate -- true` runs explicitly after the bump purely
# to write manifest.lock in canonical form; and claude-code is a flox CATALOG package (nixpkgs mirror), so
# the latest version comes from `flox show claude-code`, NOT a GitHub release API. The bump also
# isolates claude-code in its own flox pkg-group ("claude-code"): flox resolves a group against one
# catalog page, and sharing the default "ai" group with codex makes a bumped pin unsatisfiable.
#
# Operates on every repos.yaml entry that has an `orchestrators.claude` block
# (select(.orchestrators.claude != null)), reading the reusable-workflow inputs from that block.
# The 6 kind=agent repos have no `orchestrators:` block and are intentionally excluded: their
# claude.yml is generated by adl-cli and migrates via the generator + bump-adl.yml.
#
# App scope required on each target: contents:write, pull-requests:write,
# workflows:write (this writes a file under .github/workflows/). The Flox-pin change is under
# contents:write, already covered.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Reusable workflow ref to pin callers to. Blank = main (callers track the reusable workflow live, no re-migrate rollout needed).'
        required: false
        type: string
        default: ''
      repository:
        description: 'Optional single repos.yaml target (with an orchestrators.claude block) to migrate; blank = all'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Render + print the diff but skip PR creation (manual runs preview by default)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
      ref: ${{ steps.ref.outputs.ref }}
      claude_code_version: ${{ steps.resolve.outputs.version }}
      claude_action_version: ${{ steps.actionver.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Flox
        uses: flox/install-flox-action@v2.5.3
        with:
          version: "1.13.0"

      - name: Resolve latest claude-code catalog version
        id: resolve
        run: |
          set -euo pipefail
          V=$(flox show claude-code 2>/dev/null | grep -oE 'claude-code@[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's|claude-code@||' || true)
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Unexpected latest claude-code version from flox show: '$V'"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "::notice::Latest flox-catalog claude-code is ${V}; each target's Flox pin will be bumped to it"

      - name: Resolve reusable-workflow ref
        id: ref
        env:
          REF_IN: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$REF_IN" ]; then
            ref="$REF_IN"
          else
            ref=main
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "::notice::Callers will pin inference-gateway/.github/.github/workflows/claude.yml@${ref}"

      - name: Resolve claude-code-action pinned at the reusable-workflow ref
        id: actionver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          CA=$(gh api "repos/inference-gateway/.github/contents/.github/workflows/claude.yml?ref=${REF}" -H "Accept: application/vnd.github.raw" 2>/dev/null | grep -oE 'anthropics/claude-code-action@v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's|.*@||' || true)
          echo "version=$CA" >> "$GITHUB_OUTPUT"
          echo "::notice::claude-code-action pinned at ${REF}: ${CA:-<unresolved>}"

      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: '.orchestrators.claude != null'
          repository: ${{ inputs.repository }}

  migrate:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    concurrency:
      group: migrate-claude-${{ matrix.target.name }}
      cancel-in-progress: false
    env:
      CLAUDE_CODE_VERSION: ${{ needs.matrix.outputs.claude_code_version }}
    steps:
      - name: Mint GitHub App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v7.0.0
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Resolve target's current claude-code-action (via its existing caller ref)
        id: oldca
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OLD_REF=$(grep -oE 'inference-gateway/\.github/\.github/workflows/claude\.yml@[^[:space:]"'"'"']+' .github/workflows/claude.yml 2>/dev/null | head -1 | sed 's|.*@||' || true)
          if [ -z "$OLD_REF" ]; then
            echo "claude_action_old=" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: no existing claude.yml caller ref; claude-code-action transition omitted"
          else
            CA_OLD=$(gh api "repos/inference-gateway/.github/contents/.github/workflows/claude.yml?ref=${OLD_REF}" -H "Accept: application/vnd.github.raw" 2>/dev/null | grep -oE 'anthropics/claude-code-action@v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's|.*@||' || true)
            echo "claude_action_old=$CA_OLD" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: current caller @${OLD_REF} -> claude-code-action ${CA_OLD:-<unresolved>}"
          fi

      - name: Install Flox
        uses: flox/install-flox-action@v2.5.3
        with:
          version: "1.13.0"

      - name: Bump claude-code pin in the target's Flox manifest
        id: bump
        working-directory: target
        env:
          NEW: ${{ env.CLAUDE_CODE_VERSION }}
          NIX_CONFIG: "access-tokens = github.com=${{ steps.token.outputs.token }}"
        run: |
          set -euo pipefail
          if [ ! -f .flox/env/manifest.toml ]; then
            echo "::notice::${{ matrix.target.name }} has no Flox env; bootstrapping one pinning claude-code ${NEW}"
            flox init
            rm -f .flox/env/manifest.lock
            SCHEMA=$(grep -oE '^schema-version = "[^"]+"' .flox/env/manifest.toml | head -1 | cut -d'"' -f2 || true)
            [ -n "$SCHEMA" ] || SCHEMA="1.13.0"
            printf 'schema-version = "%s"\n\n[install]\nclaude-code.pkg-path = "claude-code"\nclaude-code.version = "^%s"\nclaude-code.pkg-group = "claude-code"\n' "$SCHEMA" "$NEW" > .flox/env/manifest.toml
            flox activate -- true
            echo "old=$NEW" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: bootstrapped Flox env pinning claude-code ${NEW}"
            exit 0
          fi
          LINE=$(grep -E '^claude-code\.version' .flox/env/manifest.toml | head -1 || true)
          OLD_PIN=$(printf '%s' "$LINE" | cut -d'"' -f2)
          OLD=$(printf '%s' "$OLD_PIN" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$OLD" ]; then
            echo "::error::${{ matrix.target.name }} .flox/env/manifest.toml has no claude-code.version pin"
            exit 1
          fi
          echo "old=$OLD" >> "$GITHUB_OUTPUT"

          CUR_GROUP=$(grep -E '^claude-code\.pkg-group' .flox/env/manifest.toml | head -1 | cut -d'"' -f2 || true)
          if [ "$CUR_GROUP" = "claude-code" ]; then
            echo "::notice::${{ matrix.target.name }}: claude-code already isolated in its own pkg-group"
          elif [ -n "$CUR_GROUP" ]; then
            sed -i "s|claude-code.pkg-group = \"${CUR_GROUP}\"|claude-code.pkg-group = \"claude-code\"|" .flox/env/manifest.toml
            echo "::notice::${{ matrix.target.name }}: claude-code pkg-group ${CUR_GROUP} -> claude-code"
          else
            sed -i "s|^\(claude-code\.pkg-path = .*\)$|\1\nclaude-code.pkg-group = \"claude-code\"|" .flox/env/manifest.toml
            echo "::notice::${{ matrix.target.name }}: added claude-code.pkg-group = claude-code"
          fi

          if [ "$OLD" = "$NEW" ]; then
            echo "::notice::${{ matrix.target.name }} already pins claude-code ${NEW}"
          else
            PREFIX="${OLD_PIN%%[0-9]*}"  # the operator chars before the version, e.g. ^ (or empty)
            sed -i "s|claude-code.version = \"${OLD_PIN}\"|claude-code.version = \"${PREFIX}${NEW}\"|" .flox/env/manifest.toml
            echo "::notice::${{ matrix.target.name }}: claude-code ${OLD} -> ${NEW}"
          fi

      - name: Refresh Flox lock (scoped to claude-code)
        working-directory: target
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ steps.token.outputs.token }}"
        run: |
          flox upgrade claude-code
          flox activate -- true

      - name: Render thin caller
        working-directory: target
        env:
          CLAUDE_JSON: ${{ toJSON(matrix.target.orchestrators.claude) }}
          LANG: ${{ matrix.target.language }}
          REF: ${{ needs.matrix.outputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p .github/workflows

          static_browser=$(echo "$CLAUDE_JSON" | jq -r 'if .browser == true then "true" else "false" end')

          with_block=$(echo "$CLAUDE_JSON" | jq -r --arg lang "$LANG" '
            {language: $lang} + . | del(.browser, .skills, .plugins)
            | to_entries
            | map("      \(.key): \(.value | if type == "string" then "\"\(.)\"" else tostring end)")
            | .[]')

          {
            cat <<'HEADER'
          ---
          name: Claude Code

          # Thin caller for the org-wide reusable @claude workflow.
          # Source of truth: inference-gateway/.github/.github/workflows/claude.yml
          # Inputs are managed centrally in inference-gateway/.github/repos.yaml (the entry's orchestrators.claude block).
          # Do not hand-edit setup here; change the reusable workflow or repos.yaml instead.

          on:
            workflow_dispatch:
              inputs:
                prompt:
                  description: 'Free-text task for Claude to work on in this repo'
                  required: true
                  type: string
                browser:
                  description: 'Install Chromium + enable the browser MCP (mcp__playwright) for this run'
                  required: false
                  type: boolean
                  default: false
            issue_comment:
              types:
                - created
            pull_request_review_comment:
              types:
                - created
            issues:
              types:
                - opened
                - assigned
            pull_request_review:
              types:
                - submitted

          permissions: {}

          jobs:
            claude:
              if: |
                github.event_name == 'workflow_dispatch' ||
                (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
                (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
                (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
                (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
              permissions:
                contents: write
                pull-requests: write
                issues: write
                id-token: write
                actions: read
          HEADER
            echo "    uses: inference-gateway/.github/.github/workflows/claude.yml@${REF}"
            echo "    with:"
            echo "$with_block"
            d='$'
            echo "      browser: ${d}{{ inputs.browser || ${static_browser} }}"
            echo "      prompt: ${d}{{ inputs.prompt }}"
            echo "    secrets: inherit"
          } > .github/workflows/claude.yml

          echo "::group::Rendered .github/workflows/claude.yml"
          cat .github/workflows/claude.yml
          echo "::endgroup::"

      - name: Skip check
        id: skip
        working-directory: target
        run: |
          set -euo pipefail
          git add -- .github/workflows/claude.yml .flox
          if git diff --cached --quiet -- .github/workflows/claude.yml .flox; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: claude.yml + Flox pin already current; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: claude.yml / Flox pin will be created or updated"
          fi

      - name: Show diff
        if: steps.skip.outputs.skip != 'true'
        working-directory: target
        run: git -c color.ui=always diff --cached -- .github/workflows/claude.yml .flox || true

      - name: Compose PR title
        id: meta
        if: steps.skip.outputs.skip != 'true'
        env:
          CLI_OLD: ${{ steps.bump.outputs.old }}
          CLI_NEW: ${{ env.CLAUDE_CODE_VERSION }}
          CA_OLD: ${{ steps.oldca.outputs.claude_action_old }}
          CA_NEW: ${{ needs.matrix.outputs.claude_action_version }}
        run: |
          set -euo pipefail
          parts=()
          if [ "$CLI_OLD" != "$CLI_NEW" ]; then
            parts+=("claude-code ${CLI_OLD} -> ${CLI_NEW}")
          fi
          if [ -n "$CA_OLD" ] && [ -n "$CA_NEW" ] && [ "$CA_OLD" != "$CA_NEW" ]; then
            parts+=("claude-code-action ${CA_OLD} -> ${CA_NEW}")
          fi
          if [ "${#parts[@]}" -gt 0 ]; then
            joined="${parts[0]}"
            for p in "${parts[@]:1}"; do joined="${joined}, ${p}"; done
            title="chore(deps): bump ${joined}"
          else
            title="ci(claude): centralize claude.yml via reusable workflow"
          fi
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "::notice::PR title -> $title"

      - name: Create or update pull request
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run }}
        id: pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.token.outputs.token }}
          path: target
          branch: bot/centralize-claude-workflow
          base: main
          sign-commits: true
          delete-branch: true
          add-paths: |
            .github/workflows/claude.yml
            .flox
          commit-message: ${{ steps.meta.outputs.title }}
          title: ${{ steps.meta.outputs.title }}
          body: |
            ## Summary
            Centralized-config changes in one PR:

            1. Adds/updates `.github/workflows/claude.yml` as a thin caller of the org reusable workflow
               `inference-gateway/.github/.github/workflows/claude.yml@${{ needs.matrix.outputs.ref }}`,
               wiring the `@claude` bot (anthropics/claude-code-action) into this repo.
            2. Bumps this repo's Flox `claude-code` pin (`.flox/env/manifest.toml`) to
               `${{ needs.matrix.outputs.claude_code_version }}` (the latest flox catalog version) and
               refreshes `.flox/env/manifest.lock`.

            Setup lives centrally, so future moves (action bump, model, tool scope, CLI version) are a
            **re-run of `migrate-claude.yml`** instead of a hand-edit per repo.

            Ran in CI:
            - sed the `claude-code.version` floor in `.flox/env/manifest.toml` to the latest catalog version
            - `flox upgrade claude-code` + `flox activate` to refresh `.flox/env/manifest.lock` in canonical form

            > **Note:** `claude-code` is a flox catalog package (nixpkgs mirror), not a GitHub release,
            > so the latest version is read from `flox show claude-code`. No `.claude/` config is
            > regenerated (claude-code has no `init` step).

            ### Notes
            - Tools = a shared default (`Bash(task:*),Bash(gh:*),Bash(git:*)`) + the language preset +
              this repo's extras, configured in `repos.yaml` (the entry's `orchestrators.claude` block).
            - If this repo previously narrowed `gh` scope or used a quirky tool list, that is preserved
              via `allowed-tools`; otherwise the list is normalized (e.g. a stray `Bash(go:*)` on a
              non-Go repo is dropped).

            Filed by [migrate-claude.yml](https://github.com/inference-gateway/.github/blob/main/.github/workflows/migrate-claude.yml).
          labels: |
            ci
            bot

      - name: Report PR outcome
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run && steps.pr.outputs.pull-request-number != '' }}
        env:
          CA_OLD: ${{ steps.oldca.outputs.claude_action_old }}
          CA_NEW: ${{ needs.matrix.outputs.claude_action_version }}
        run: |
          {
            echo "### ${{ matrix.target.name }}"
            echo "- Operation: \`${{ steps.pr.outputs.pull-request-operation }}\`"
            echo "- Title: \`${{ steps.meta.outputs.title }}\`"
            echo "- claude-code: \`${{ steps.bump.outputs.old }}\` -> \`${{ needs.matrix.outputs.claude_code_version }}\`"
            if [ -n "$CA_OLD" ] && [ -n "$CA_NEW" ] && [ "$CA_OLD" != "$CA_NEW" ]; then
              echo "- claude-code-action: \`${CA_OLD}\` -> \`${CA_NEW}\` (via reusable ref)"
            fi
            echo "- PR: ${{ steps.pr.outputs.pull-request-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run summary
        if: ${{ steps.skip.outputs.skip != 'true' && inputs.dry_run }}
        working-directory: target
        run: |
          {
            echo "## Dry-run: ${{ matrix.target.name }}"
            echo "Would open PR titled: \`${{ steps.meta.outputs.title }}\`"
            echo
            echo '```diff'
            git diff --cached -- .github/workflows/claude.yml .flox || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
