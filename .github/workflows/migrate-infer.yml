---
name: Migrate infer.yml to reusable workflow

# One-shot fan-out: per target repo it (1) writes .github/workflows/infer.yml as a thin caller of
# the org reusable workflow (.github/.github/workflows/infer.yml) and (2) bumps the target's OWN Flox
# infer pin (.flox/env/manifest.toml) to the latest inference-gateway/cli release and refreshes the
# lock - then opens ONE PR carrying both.
#
# Mirrors migrate-claude.yml: detect the target's current pin, sed it to latest, `flox upgrade infer`,
# `flox activate -- true` to canonicalize the lock, commit manifest.toml + manifest.lock + infer.yml.
#
# Operates on every repos.yaml entry that has an `orchestrators.infer` block
# (select(.orchestrators.infer != null)), reading the reusable-workflow inputs from that block. The
# 6 kind=agent repos have no `orchestrators:` block and are intentionally excluded: their bot
# workflows are generated by adl-cli and migrate via the generator + bump-adl.yml.
#
# App scope required on each target: contents:write, pull-requests:write,
# workflows:write (this writes a file under .github/workflows/). The Flox-pin changes are
# under contents:write, already covered.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Reusable workflow ref to pin callers to. Blank = main (callers track the reusable workflow live, no re-migrate rollout needed).'
        required: false
        type: string
        default: ''
      bump_flox:
        description: 'Also bump the target Flox infer pin in the same PR (uncheck to only (re)write infer.yml)'
        required: false
        type: boolean
        default: true
      repository:
        description: 'Optional single repos.yaml target (with an orchestrators.infer block) to migrate; blank = all'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Render + print the diff but skip PR creation (manual runs preview by default)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
      ref: ${{ steps.ref.outputs.ref }}
      infer_version: ${{ steps.resolve.outputs.version }}
      infer_action_version: ${{ steps.actionver.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Resolve latest infer CLI version
        id: resolve
        if: inputs.bump_flox
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V=$(gh api repos/inference-gateway/cli/releases/latest --jq .tag_name)
          if ! echo "$V" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Unexpected latest infer CLI tag from releases/latest: '$V'"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "::notice::Latest infer CLI is ${V}; each target's Flox pin will be bumped to it"

      - name: Resolve reusable-workflow ref
        id: ref
        env:
          REF_IN: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$REF_IN" ]; then
            ref="$REF_IN"
          else
            ref=main
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "::notice::Callers will pin inference-gateway/.github/.github/workflows/infer.yml@${ref}"

      - name: Resolve infer-action pinned at the reusable-workflow ref
        id: actionver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          IA=$(gh api "repos/inference-gateway/.github/contents/.github/workflows/infer.yml?ref=${REF}" -H "Accept: application/vnd.github.raw" 2>/dev/null | grep -oE 'inference-gateway/infer-action@v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's|.*@||' || true)
          echo "version=$IA" >> "$GITHUB_OUTPUT"
          echo "::notice::infer-action pinned at ${REF}: ${IA:-<unresolved>}"

      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: '.orchestrators.infer != null'
          repository: ${{ inputs.repository }}

  migrate:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    concurrency:
      group: migrate-infer-${{ matrix.target.name }}
      cancel-in-progress: false
    env:
      INFER_VERSION: ${{ needs.matrix.outputs.infer_version }}
    steps:
      - name: Mint GitHub App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v7.0.1
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Resolve target's current infer-action (via its existing caller ref)
        id: oldia
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OLD_REF=$(grep -oE 'inference-gateway/\.github/\.github/workflows/infer\.yml@[^[:space:]"'"'"']+' .github/workflows/infer.yml 2>/dev/null | head -1 | sed 's|.*@||' || true)
          if [ -z "$OLD_REF" ]; then
            echo "infer_action_old=" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: no existing infer.yml caller ref; infer-action transition omitted"
          else
            IA_OLD=$(gh api "repos/inference-gateway/.github/contents/.github/workflows/infer.yml?ref=${OLD_REF}" -H "Accept: application/vnd.github.raw" 2>/dev/null | grep -oE 'inference-gateway/infer-action@v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's|.*@||' || true)
            echo "infer_action_old=$IA_OLD" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: current caller @${OLD_REF} -> infer-action ${IA_OLD:-<unresolved>}"
          fi

      - name: Install Flox
        if: inputs.bump_flox
        uses: flox/install-flox-action@v2.5.3
        with:
          version: "1.13.0"

      - name: Bump infer pin in the target's Flox manifest
        id: bump
        if: inputs.bump_flox
        working-directory: target
        env:
          NEW: ${{ env.INFER_VERSION }}
          NIX_CONFIG: "access-tokens = github.com=${{ steps.token.outputs.token }}"
        run: |
          set -euo pipefail
          if [ ! -f .flox/env/manifest.toml ]; then
            echo "::notice::${{ matrix.target.name }} has no Flox env; bootstrapping one pinning infer ${NEW}"
            flox init
            rm -f .flox/env/manifest.lock
            SCHEMA=$(grep -oE '^schema-version = "[^"]+"' .flox/env/manifest.toml | head -1 | cut -d'"' -f2 || true)
            [ -n "$SCHEMA" ] || SCHEMA="1.13.0"
            printf 'schema-version = "%s"\n\n[install]\ninfer.flake = "github:inference-gateway/cli/%s"\n' "$SCHEMA" "$NEW" > .flox/env/manifest.toml
            flox activate -- true
            echo "old=$NEW" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: bootstrapped Flox env pinning infer ${NEW}"
            exit 0
          fi
          OLD=$(grep -oE 'inference-gateway/cli/v[0-9]+\.[0-9]+\.[0-9]+' .flox/env/manifest.toml | head -1 | sed 's|inference-gateway/cli/||')
          if [ -z "$OLD" ]; then
            echo "::error::${{ matrix.target.name }} .flox/env/manifest.toml has no inference-gateway/cli infer pin"
            exit 1
          fi
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          if [ "$OLD" = "$NEW" ]; then
            echo "::notice::${{ matrix.target.name }} already pins infer ${NEW}"
          else
            sed -i "s|inference-gateway/cli/${OLD}|inference-gateway/cli/${NEW}|g" .flox/env/manifest.toml
            echo "::notice::${{ matrix.target.name }}: infer ${OLD} -> ${NEW}"
          fi

      - name: Refresh Flox lock (scoped to infer)
        if: inputs.bump_flox
        working-directory: target
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ steps.token.outputs.token }}"
        run: |
          flox upgrade infer
          flox activate -- true

      - name: Render thin caller
        working-directory: target
        env:
          INFER_JSON: ${{ toJSON(matrix.target.orchestrators.infer) }}
          LANG: ${{ matrix.target.language }}
          REF: ${{ needs.matrix.outputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p .github/workflows

          with_block=$(echo "$INFER_JSON" | jq -r --arg lang "$LANG" '
            {language: $lang} + .
            | to_entries
            | map(if (.value | type) == "string" and (.value | contains("\n"))
                  then "      \(.key): |\n" + (.value | rtrimstr("\n") | split("\n") | map("        " + .) | join("\n"))
                  else "      \(.key): \(.value | if type == "string" then "\"\(.)\"" else tostring end)"
                  end)
            | .[]')

          {
            cat <<'HEADER'
          ---
          name: Infer

          # Thin caller for the org-wide reusable @infer workflow.
          # Source of truth: inference-gateway/.github/.github/workflows/infer.yml
          # Inputs are managed centrally in inference-gateway/.github/repos.yaml (the entry's orchestrators.infer block).
          # Do not hand-edit setup here; change the reusable workflow or repos.yaml instead.

          on:
            workflow_dispatch:
              inputs:
                prompt:
                  description: 'Free-text task for infer (deepseek) to work on in this repo'
                  required: true
                  type: string
            issues:
              types:
                - opened
                - edited
            issue_comment:
              types:
                - created
            pull_request_review_comment:
              types:
                - created
            pull_request_review:
              types:
                - submitted

          permissions: {}

          jobs:
            infer:
              if: |
                github.event_name == 'workflow_dispatch' ||
                (
                  github.event.sender.type != 'Bot' &&
                  !endsWith(github.actor, '[bot]') &&
                  (
                    (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@infer')) ||
                    (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@infer')) ||
                    (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@infer')) ||
                    (github.event_name == 'issues' && (contains(github.event.issue.body, '@infer') || contains(github.event.issue.title, '@infer')))
                  )
                )
              permissions:
                contents: write
                pull-requests: write
                issues: write
          HEADER
            echo "    uses: inference-gateway/.github/.github/workflows/infer.yml@${REF}"
            echo "    with:"
            echo "$with_block"
            d='$'
            echo "      prompt: ${d}{{ inputs.prompt }}"
            echo "    secrets: inherit"
          } > .github/workflows/infer.yml

          echo "::group::Rendered .github/workflows/infer.yml"
          cat .github/workflows/infer.yml
          echo "::endgroup::"

      - name: Skip check
        id: skip
        working-directory: target
        run: |
          set -euo pipefail
          git add -- .github/workflows/infer.yml .flox
          if git diff --cached --quiet -- .github/workflows/infer.yml .flox; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: infer.yml + Flox pin already current; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: infer.yml / Flox pin will be created or updated"
          fi

      - name: Show diff
        if: steps.skip.outputs.skip != 'true'
        working-directory: target
        run: git -c color.ui=always diff --cached -- .github/workflows/infer.yml .flox || true

      - name: Compose PR title
        id: meta
        if: steps.skip.outputs.skip != 'true'
        env:
          CLI_OLD: ${{ steps.bump.outputs.old }}
          CLI_NEW: ${{ env.INFER_VERSION }}
          IA_OLD: ${{ steps.oldia.outputs.infer_action_old }}
          IA_NEW: ${{ needs.matrix.outputs.infer_action_version }}
        run: |
          set -euo pipefail
          parts=()
          if [ "$CLI_OLD" != "$CLI_NEW" ]; then
            parts+=("infer CLI ${CLI_OLD} -> ${CLI_NEW}")
          fi
          if [ -n "$IA_OLD" ] && [ -n "$IA_NEW" ] && [ "$IA_OLD" != "$IA_NEW" ]; then
            parts+=("infer-action ${IA_OLD} -> ${IA_NEW}")
          fi
          if [ "${#parts[@]}" -gt 0 ]; then
            joined="${parts[0]}"
            for p in "${parts[@]:1}"; do joined="${joined}, ${p}"; done
            title="chore(deps): bump ${joined}"
          else
            title="ci(infer): centralize infer.yml via reusable workflow"
          fi
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "::notice::PR title -> $title"

      - name: Create or update pull request
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run }}
        id: pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.token.outputs.token }}
          path: target
          branch: bot/centralize-infer-workflow
          base: main
          sign-commits: true
          delete-branch: true
          add-paths: |
            .github/workflows/infer.yml
            .flox
          commit-message: ${{ steps.meta.outputs.title }}
          title: ${{ steps.meta.outputs.title }}
          body: |
            ## Summary
            Centralized-config changes in one PR:

            1. Adds/updates `.github/workflows/infer.yml` as a thin caller of the org reusable workflow
               `inference-gateway/.github/.github/workflows/infer.yml@${{ needs.matrix.outputs.ref }}`,
               wiring the `@infer` bot (inference-gateway/infer-action) into this repo.
            2. Bumps this repo's Flox `infer` pin (`.flox/env/manifest.toml`) to
               `${{ needs.matrix.outputs.infer_version }}` (the latest `inference-gateway/cli` release) and
               refreshes `.flox/env/manifest.lock`.

            Setup lives centrally, so future moves (action bump, model, tool scope, CLI version) are a
            **re-run of `migrate-infer.yml`** instead of a hand-edit per repo.

            Ran in CI (mirrors `migrate-claude.yml`):
            - sed the `inference-gateway/cli` pin in `.flox/env/manifest.toml` to the latest release
            - `flox upgrade infer` + `flox activate -- true` to refresh `.flox/env/manifest.lock` in canonical form

            ### Notes
            - Triggers on `@infer` mentions in issues / issue comments. Default model
              `deepseek/deepseek-v4-flash`. The `infer-action` pin lives in the reusable `infer.yml`.
            - Also adds a manual `workflow_dispatch` form: from this repo's Actions tab pick **Infer**,
              type a free-text `prompt`, and the bot works it in that run and opens a PR (no issue
              needed) - mirroring the `@claude` workflow.
            - Tools = infer-action's default bash whitelist + the language preset (+ markdownlint where
              set), configured in `repos.yaml` (the entry's `orchestrators.infer` block).
            - Requires the maintainer GitHub App (`INFERENCE_GATEWAY_MAINTAINER_APP_ID` /
              `INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY`) installed on this repo plus the provider
              API-key secrets; both reach the reusable workflow via `secrets: inherit`.

            Filed by [migrate-infer.yml](https://github.com/inference-gateway/.github/blob/main/.github/workflows/migrate-infer.yml).
          labels: |
            ci
            bot

      - name: Report PR outcome
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run && steps.pr.outputs.pull-request-number != '' }}
        env:
          IA_OLD: ${{ steps.oldia.outputs.infer_action_old }}
          IA_NEW: ${{ needs.matrix.outputs.infer_action_version }}
        run: |
          {
            echo "### ${{ matrix.target.name }}"
            echo "- Operation: \`${{ steps.pr.outputs.pull-request-operation }}\`"
            echo "- Title: \`${{ steps.meta.outputs.title }}\`"
            echo "- infer CLI: \`${{ steps.bump.outputs.old }}\` -> \`${{ needs.matrix.outputs.infer_version }}\`"
            if [ -n "$IA_OLD" ] && [ -n "$IA_NEW" ] && [ "$IA_OLD" != "$IA_NEW" ]; then
              echo "- infer-action: \`${IA_OLD}\` -> \`${IA_NEW}\` (via reusable ref)"
            fi
            echo "- PR: ${{ steps.pr.outputs.pull-request-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run summary
        if: ${{ steps.skip.outputs.skip != 'true' && inputs.dry_run }}
        working-directory: target
        run: |
          {
            echo "## Dry-run: ${{ matrix.target.name }}"
            echo "Would open PR titled: \`${{ steps.meta.outputs.title }}\`"
            echo
            echo '```diff'
            git diff --cached -- .github/workflows/infer.yml .flox || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
