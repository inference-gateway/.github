name: Migrate infer.yml to reusable workflow

# One-shot fan-out: per target repo it (1) writes .github/workflows/infer.yml as a thin caller of
# the org reusable workflow (.github/.github/workflows/infer.yml) and (2) regenerates the committed
# .infer/ config with `infer init --overwrite` (latest infer CLI by default), then opens ONE PR
# carrying both. `.infer/agents.yaml` and `.infer/mcp.yaml` (the repo-specific A2A agents + MCP
# server config) are preserved byte-for-byte across the overwrite; every other config file is reset
# to CLI defaults. Pin the CLI with the `infer_version` input.
#
# Operates on every repos.yaml entry that has an `orchestrators.infer` block
# (select(.orchestrators.infer != null)), reading the reusable-workflow inputs from that block. The
# 6 kind=agent repos have no `orchestrators:` block and are intentionally excluded: their bot
# workflows are generated by adl-cli and migrate via the generator + bump-adl.yml.
#
# App scope required on each target: contents:write, pull-requests:write,
# workflows:write (this writes a file under .github/workflows/). Regenerating .infer/ needs only
# contents:write, already covered.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Reusable workflow ref to pin callers to. Blank = the latest .github release tag.'
        required: false
        type: string
        default: ''
      repository:
        description: 'Optional single repos.yaml target (with an orchestrators.infer block) to migrate; blank = all'
        required: false
        type: string
        default: ''
      infer_version:
        description: 'infer CLI version used to regenerate .infer/ (e.g. v0.112.1 or "latest")'
        required: false
        type: string
        default: latest
      dry_run:
        description: 'Render + print the diff but skip PR creation (manual runs preview by default)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
      ref: ${{ steps.ref.outputs.ref }}
      infer_version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate infer_version format
        env:
          INPUT_VERSION: ${{ inputs.infer_version }}
        run: |
          set -euo pipefail
          if [ "$INPUT_VERSION" != "latest" ] && ! echo "$INPUT_VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::infer_version must be 'latest' or v<major>.<minor>.<patch>, got: $INPUT_VERSION"
            exit 1
          fi

      - name: Resolve infer CLI version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.infer_version }}
        run: |
          set -euo pipefail
          V="$INPUT_VERSION"
          if [ "$V" = "latest" ]; then
            V=$(gh api repos/inference-gateway/cli/releases/latest --jq .tag_name)
            echo "::notice::Resolved 'latest' to ${V}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Resolve reusable-workflow ref
        id: ref
        env:
          REF_IN: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$REF_IN" ]; then
            ref="$REF_IN"
          else
            ref=$(gh release view --repo inference-gateway/.github --json tagName --jq .tagName)
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "::notice::Callers will pin inference-gateway/.github/.github/workflows/infer.yml@${ref}"

      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: '.orchestrators.infer != null'
          repository: ${{ inputs.repository }}

  migrate:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    concurrency:
      group: migrate-infer-${{ matrix.target.name }}
      cancel-in-progress: false
    env:
      INFER_VERSION: ${{ needs.matrix.outputs.infer_version }}
    steps:
      - name: Mint GitHub App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.BOT_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.BOT_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v6.0.2
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Install infer CLI
        env:
          VERSION: ${{ env.INFER_VERSION }}
          INSTALL_DIR: ${{ runner.temp }}/infer-bin
        run: |
          set -euo pipefail
          mkdir -p "$INSTALL_DIR"
          curl -fsSL https://raw.githubusercontent.com/inference-gateway/cli/main/install.sh \
            | bash -s -- --version "$VERSION" --install-dir "$INSTALL_DIR"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/infer" --version

      - name: Render thin caller
        working-directory: target
        env:
          INFER_JSON: ${{ toJSON(matrix.target.orchestrators.infer) }}
          LANG: ${{ matrix.target.language }}
          REF: ${{ needs.matrix.outputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p .github/workflows

          with_block=$(echo "$INFER_JSON" | jq -r --arg lang "$LANG" '
            {language: $lang} + .
            | to_entries
            | map("      \(.key): \(.value | if type == "string" then "\"\(.)\"" else tostring end)")
            | .[]')

          {
            cat <<'HEADER'
          ---
          name: Infer

          # Thin caller for the org-wide reusable @infer workflow.
          # Source of truth: inference-gateway/.github/.github/workflows/infer.yml
          # Inputs are managed centrally in inference-gateway/.github/repos.yaml (the entry's orchestrators.infer block).
          # Do not hand-edit setup here; change the reusable workflow or repos.yaml instead.

          on:
            issues:
              types:
                - opened
                - edited
            issue_comment:
              types:
                - created

          jobs:
            infer:
              if: |
                github.event.sender.type != 'Bot' &&
                !endsWith(github.actor, '[bot]') &&
                (
                  (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@infer')) ||
                  (github.event_name == 'issues' && (contains(github.event.issue.body, '@infer') || contains(github.event.issue.title, '@infer')))
                )
              permissions:
                contents: write
                pull-requests: write
                issues: write
          HEADER
            echo "    uses: inference-gateway/.github/.github/workflows/infer.yml@${REF}"
            echo "    with:"
            echo "$with_block"
            echo "    secrets: inherit"
          } > .github/workflows/infer.yml

          echo "::group::Rendered .github/workflows/infer.yml"
          cat .github/workflows/infer.yml
          echo "::endgroup::"

      - name: Regenerate .infer config (preserve agents.yaml + mcp.yaml)
        working-directory: target
        env:
          SNAP: ${{ runner.temp }}/infer-preserve
        run: |
          set -euo pipefail
          mkdir -p "$SNAP"
          # Snapshot repo-specific files that must survive the overwrite (only if present).
          for f in agents.yaml mcp.yaml; do
            if [ -f ".infer/$f" ]; then
              cp ".infer/$f" "$SNAP/$f"
              echo "::notice::preserving .infer/$f"
            fi
          done

          infer init --overwrite --skip-migrations

          # Restore the preserved files byte-for-byte (only those that existed before).
          for f in agents.yaml mcp.yaml; do
            [ -f "$SNAP/$f" ] && cp "$SNAP/$f" ".infer/$f"
          done

      - name: Skip check
        id: skip
        working-directory: target
        run: |
          set -euo pipefail
          git add -- .github/workflows/infer.yml .infer
          if git diff --cached --quiet -- .github/workflows/infer.yml .infer; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: infer.yml + .infer already current; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.target.name }}: infer.yml and/or .infer/ will be created or updated"
          fi

      - name: Show diff
        if: steps.skip.outputs.skip != 'true'
        working-directory: target
        run: git -c color.ui=always diff --cached -- .github/workflows/infer.yml .infer || true

      - name: Create or update pull request
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run }}
        id: pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.token.outputs.token }}
          path: target
          branch: bot/centralize-infer-workflow
          base: main
          sign-commits: true
          delete-branch: true
          add-paths: |
            .github/workflows/infer.yml
            .infer
          commit-message: "ci: centralize infer.yml + sync .infer config"
          title: "ci: centralize infer.yml + sync .infer config"
          body: |
            ## Summary
            Two centralized-config changes in one PR:

            1. Adds this repo's `.github/workflows/infer.yml` as a thin caller of the org reusable
               workflow `inference-gateway/.github/.github/workflows/infer.yml@${{ needs.matrix.outputs.ref }}`,
               wiring the `@infer` bot (inference-gateway/infer-action) into this repo.
            2. Regenerates the committed `.infer/` config with `infer init --overwrite` using infer CLI
               `${{ needs.matrix.outputs.infer_version }}`, so this repo's config matches the latest CLI.
               `.infer/bin`, `logs`, history and the conversations DB stay out via the nested
               `.infer/.gitignore`.

            Setup lives centrally, so future fixes (action bump, model, tool scope, CLI config) become
            **one PR in `.github` + a tag move** instead of one PR per repo.

            > **Heads-up:** `infer init --overwrite` resets `.infer/` to CLI defaults. `.infer/agents.yaml`
            > and `.infer/mcp.yaml` (this repo's A2A agents registry + MCP servers) are **preserved**
            > byte-for-byte; every other config file (`config.yaml`, `prompts.yaml`, `keybindings.yaml`,
            > `channels.yaml`, `computer_use.yaml`, `heartbeat.yaml`, `shortcuts/*`) is regenerated.
            > Review the diff before merging.

            ### Notes
            - Triggers on `@infer` mentions in issues / issue comments. The reusable workflow pins
              `inference-gateway/infer-action@v0.9.1` and defaults the model to `deepseek/deepseek-v4-flash`.
            - Tools = infer-action's default bash whitelist + the language preset (+ markdownlint where
              set), configured in `repos.yaml` (the entry's `orchestrators.infer` block).
            - Requires the `@infer` GitHub App (`INFER_APP_ID` / `INFER_APP_PRIVATE_KEY`) installed on
              this repo plus the provider API-key secrets; both reach the reusable workflow via
              `secrets: inherit`.

            Filed by [migrate-infer.yml](https://github.com/inference-gateway/.github/blob/main/.github/workflows/migrate-infer.yml).
          labels: |
            ci

      - name: Report PR outcome
        if: ${{ steps.skip.outputs.skip != 'true' && !inputs.dry_run && steps.pr.outputs.pull-request-number != '' }}
        run: |
          {
            echo "### ${{ matrix.target.name }}"
            echo "- Operation: \`${{ steps.pr.outputs.pull-request-operation }}\`"
            echo "- PR: ${{ steps.pr.outputs.pull-request-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run summary
        if: ${{ steps.skip.outputs.skip != 'true' && inputs.dry_run }}
        working-directory: target
        run: |
          {
            echo "## Dry-run: ${{ matrix.target.name }} (infer CLI ${INFER_VERSION})"
            echo '```diff'
            git diff --cached -- .github/workflows/infer.yml .infer || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
