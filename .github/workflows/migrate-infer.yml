name: Migrate infer.yml to reusable workflow

# One-shot fan-out: writes each target's .github/workflows/infer.yml as a thin caller of the org
# reusable workflow (.github/.github/workflows/infer.yml) and opens a PR per repo.
#
# Operates on every repos.yaml entry that has an `orchestrators.infer` block
# (select(.orchestrators.infer != null)), reading the reusable-workflow inputs from that block. The
# 6 kind=agent repos have no `orchestrators:` block and are intentionally excluded: their bot
# workflows are generated by adl-cli and migrate via the generator + bump-adl.yml.
#
# App scope required on each target: contents:write, pull-requests:write,
# workflows:write (this writes a file under .github/workflows/).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Reusable workflow ref to pin callers to. Blank = the latest .github release tag.'
        required: false
        type: string
        default: ''
      repository:
        description: 'Optional single repos.yaml target (with an orchestrators.infer block) to migrate; blank = all'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Render + print the diff but skip PR creation (manual runs preview by default)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve reusable-workflow ref
        id: ref
        env:
          REF_IN: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$REF_IN" ]; then
            ref="$REF_IN"
          else
            ref=$(gh release view --repo inference-gateway/.github --json tagName --jq .tagName)
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "::notice::Callers will pin inference-gateway/.github/.github/workflows/infer.yml@${ref}"

      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          # Every repo with an orchestrators.infer block (i.e. a centralized infer.yml caller).
          # The 6 kind=agent repos have no orchestrators block and are intentionally skipped.
          select: '.orchestrators.infer != null'
          repository: ${{ inputs.repository }}

  migrate:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    concurrency:
      group: migrate-infer-${{ matrix.target.name }}
      cancel-in-progress: false
    steps:
      - name: Mint GitHub App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.BOT_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.BOT_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v6.0.2
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Render thin caller
        working-directory: target
        env:
          INFER_JSON: ${{ toJSON(matrix.target.orchestrators.infer) }}
          REF: ${{ needs.matrix.outputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p .github/workflows

          # Build the `with:` block from the entry's orchestrators.infer block; strings
          # quoted, booleans/numbers bare. Keys map 1:1 to reusable infer.yml inputs.
          with_block=$(echo "$INFER_JSON" | jq -r '
            to_entries
            | map("      \(.key): \(.value | if type == "string" then "\"\(.)\"" else tostring end)")
            | .[]')

          {
            cat <<'HEADER'
          ---
          name: Infer

          # Thin caller for the org-wide reusable @infer workflow.
          # Source of truth: inference-gateway/.github/.github/workflows/infer.yml
          # Inputs are managed centrally in inference-gateway/.github/repos.yaml (the entry's orchestrators.infer block).
          # Do not hand-edit setup here; change the reusable workflow or repos.yaml instead.

          on:
            issues:
              types:
                - opened
                - edited
            issue_comment:
              types:
                - created

          jobs:
            infer:
              if: |
                github.event.sender.type != 'Bot' &&
                !endsWith(github.actor, '[bot]') &&
                (
                  (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@infer')) ||
                  (github.event_name == 'issues' && (contains(github.event.issue.body, '@infer') || contains(github.event.issue.title, '@infer')))
                )
              permissions:
                contents: write
                pull-requests: write
                issues: write
          HEADER
            echo "    uses: inference-gateway/.github/.github/workflows/infer.yml@${REF}"
            echo "    with:"
            echo "$with_block"
            echo "    secrets: inherit"
          } > .github/workflows/infer.yml

          echo "::group::Rendered .github/workflows/infer.yml"
          cat .github/workflows/infer.yml
          echo "::endgroup::"

      - name: Show diff
        working-directory: target
        run: |
          if [ -z "$(git status --porcelain -- .github/workflows/infer.yml)" ]; then
            echo "::notice::${{ matrix.target.name }}: no change (already migrated)"
          else
            echo "::notice::${{ matrix.target.name }}: infer.yml will be created or updated"
            git -c color.ui=always diff -- .github/workflows/infer.yml || true
          fi

      - name: Create or update pull request
        if: ${{ !inputs.dry_run }}
        id: pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.token.outputs.token }}
          path: target
          branch: bot/centralize-infer-workflow
          base: main
          sign-commits: true
          delete-branch: true
          add-paths: .github/workflows/infer.yml
          commit-message: "ci: centralize infer.yml via reusable workflow"
          title: "ci: centralize infer.yml via reusable workflow"
          body: |
            ## Summary
            Adds this repo's `.github/workflows/infer.yml` as a thin caller of the org reusable
            workflow `inference-gateway/.github/.github/workflows/infer.yml@${{ needs.matrix.outputs.ref }}`,
            wiring the `@infer` bot (inference-gateway/infer-action) into this repo.

            Setup lives centrally, so future fixes (action bump, model, tool scope) become **one PR in
            `.github` + a tag move** instead of one PR per repo.

            ### Notes
            - Triggers on `@infer` mentions in issues / issue comments. The reusable workflow pins
              `inference-gateway/infer-action@v0.9.1` and defaults the model to `deepseek/deepseek-v4-flash`.
            - Tools = infer-action's default bash whitelist + the language preset (+ markdownlint where
              set), configured in `repos.yaml` (the entry's `orchestrators.infer` block).
            - Requires the `@infer` GitHub App (`INFER_APP_ID` / `INFER_APP_PRIVATE_KEY`) installed on
              this repo plus the provider API-key secrets; both reach the reusable workflow via
              `secrets: inherit`.

            Filed by [migrate-infer.yml](https://github.com/inference-gateway/.github/blob/main/.github/workflows/migrate-infer.yml).
          labels: |
            ci

      - name: Report PR outcome
        if: ${{ !inputs.dry_run && steps.pr.outputs.pull-request-number != '' }}
        run: |
          {
            echo "### ${{ matrix.target.name }}"
            echo "- Operation: \`${{ steps.pr.outputs.pull-request-operation }}\`"
            echo "- PR: ${{ steps.pr.outputs.pull-request-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        working-directory: target
        run: |
          {
            echo "## Dry-run: ${{ matrix.target.name }}"
            echo '```diff'
            git add --intent-to-add .github/workflows/infer.yml
            git diff -- .github/workflows/infer.yml || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
