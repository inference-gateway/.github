---
name: Stale issues sweep

# Daily sweep across every target in repos.yaml except kind: none
# (select(.kind != "none")). For each repo, marks issues with no activity
# for 30 days as `stale` and closes ones that remain stale for another
# 7 days. Replaces per-repo stale.yml workflows so the policy lives in one place.
#
# Exempt labels:
#   - pinned, security: human override - never touch
#   - sdk-drift, adk-drift: filed by sync-docs.yml / sync-adks.yml as
#     long-lived drift trackers; they may legitimately sit open for weeks
#     while a maintainer triages.
#   - docs-coverage: legacy label from the removed audit-docs-coverage.yml;
#     kept exempt so any historical tickets survive.

on:
  # schedule:
  #   - cron: '15 3 * * *'
  workflow_dispatch:
    inputs:
      repository:
        description: 'Single repos.yaml target to sweep (omit = all kind != none targets). Use to test on one repo.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Print planned actions without modifying issues (manual runs preview by default; the cron sweeps for real)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.read.outputs.targets }}
    steps:
      - uses: actions/checkout@v7.0.0
      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: '.kind != "none"'
          repository: ${{ inputs.repository }}

  sweep:
    needs: matrix
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Mint App token (scoped to ${{ matrix.target.name }})
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Sweep stale issues in inference-gateway/${{ matrix.target.name }}
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          GH_REPO: inference-gateway/${{ matrix.target.name }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          STALE_LABEL=stale
          STALE_DAYS=30
          CLOSE_DAYS=7
          EXEMPT='-label:pinned -label:security -label:sdk-drift -label:adk-drift -label:docs-coverage'

          stale_cutoff=$(date -u -d "${STALE_DAYS} days ago" +%Y-%m-%d)
          close_cutoff=$(date -u -d "${CLOSE_DAYS} days ago" +%Y-%m-%d)

          {
            echo "### ${GH_REPO}"
            echo
            echo "- mark cutoff: \`${stale_cutoff}\` (no activity since)"
            echo "- close cutoff: \`${close_cutoff}\` (stale label + no activity since)"
            echo "- dry run: \`${DRY_RUN}\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          # 1. Mark newly-stale issues
          mapfile -t to_mark < <(
            gh issue list \
              --state open \
              --search "updated:<${stale_cutoff} -label:${STALE_LABEL} ${EXEMPT}" \
              --limit 200 \
              --json number \
              --jq '.[].number'
          )
          echo "Marking ${#to_mark[@]} issue(s) as stale"
          echo "Mark candidates: ${#to_mark[@]}" >> "$GITHUB_STEP_SUMMARY"
          for n in "${to_mark[@]}"; do
            if [ "${DRY_RUN}" = "true" ]; then
              echo "  [DRY] would mark #${n}"
              echo "  - [DRY] mark #${n}" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            gh issue edit "${n}" --add-label "${STALE_LABEL}"
            gh issue comment "${n}" --body "This issue has been automatically marked as stale because it has not had any activity for ${STALE_DAYS} days. It will be closed in ${CLOSE_DAYS} days if no further activity occurs. Comment or remove the \`${STALE_LABEL}\` label to keep it open."
            echo "  marked #${n}"
            echo "  - marked #${n}" >> "$GITHUB_STEP_SUMMARY"
          done

          # 2. Close issues that have remained stale
          mapfile -t to_close < <(
            gh issue list \
              --state open \
              --label "${STALE_LABEL}" \
              --search "updated:<${close_cutoff}" \
              --limit 200 \
              --json number \
              --jq '.[].number'
          )
          echo "Closing ${#to_close[@]} stale issue(s)"
          echo "Close candidates: ${#to_close[@]}" >> "$GITHUB_STEP_SUMMARY"
          for n in "${to_close[@]}"; do
            if [ "${DRY_RUN}" = "true" ]; then
              echo "  [DRY] would close #${n}"
              echo "  - [DRY] close #${n}" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            gh issue close "${n}" --comment "This issue has been automatically closed due to inactivity. Feel free to reopen it if it is still relevant."
            echo "  closed #${n}"
            echo "  - closed #${n}" >> "$GITHUB_STEP_SUMMARY"
          done
