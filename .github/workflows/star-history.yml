---
name: Refresh org star history

on:
  # schedule:
  #    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Fetch the SVGs and print the would-be PR, but do not open/update it (manual runs preview by default; the cron opens the PR)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build repo list
        id: repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          list=$(gh repo list inference-gateway \
            --limit 200 \
            --no-archived \
            --visibility public \
            --json name,stargazerCount \
            --jq '[.[] | select(.name != ".github")]
                  | sort_by(.name) | sort_by(-.stargazerCount)
                  | .[0:10]
                  | [.[] | "inference-gateway/" + .name]
                  | join(",")')
          if [ -z "$list" ]; then
            echo "No repos resolved" >&2
            exit 1
          fi
          echo "list=$list" >> "$GITHUB_OUTPUT"

      - name: Fetch SVGs
        run: |
          set -euo pipefail
          mkdir -p assets
          for theme_suffix in "" "&theme=dark"; do
            if [ -z "$theme_suffix" ]; then
              out=assets/star-history.svg
            else
              out=assets/star-history-dark.svg
            fi
            url="https://api.star-history.com/svg?repos=${{ steps.repos.outputs.list }}&type=Date${theme_suffix}"
            tmp=$(mktemp)
            curl -fsSL --retry 3 --retry-delay 5 "$url" -o "$tmp"
            if ! head -c 200 "$tmp" | grep -q '<svg'; then
              echo "Response from star-history.com is not an SVG; aborting." >&2
              head -c 500 "$tmp" >&2
              exit 1
            fi
            mv "$tmp" "$out"
          done

      - name: Dry-run note
        if: ${{ github.event_name != 'schedule' && inputs.dry_run }}
        run: |
          {
            echo "## Dry-run: org star history"
            echo "- repos: \`${{ steps.repos.outputs.list }}\`"
            echo "- would update: \`assets/star-history.svg\`, \`assets/star-history-dark.svg\`"
            echo "- PR step skipped (dry_run=true)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update PR
        if: ${{ github.event_name == 'schedule' || !inputs.dry_run }}
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          commit-message: 'chore(assets): Refresh org star history'
          title: 'chore(assets): Refresh org star history'
          body: |
            Automated daily refresh of the org-wide star history chart
            embedded on the profile README.

            - Light: `assets/star-history.svg`
            - Dark: `assets/star-history-dark.svg`

            Generated by `.github/workflows/star-history.yml`.
          branch: chore/star-history-refresh
          base: main
          delete-branch: true
          add-paths: |
            assets/star-history.svg
            assets/star-history-dark.svg
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
