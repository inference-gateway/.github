name: Sync ADKs with A2A schema

# Triggered when the canonical A2A JSON-RPC schema at inference-gateway/schemas
# changes (via repository_dispatch from that repo) or manually. For each
# kind=adk target in repos.yaml, runs Claude Code Action with a single audit
# prompt that detects drift against the A2A schema and files structured issues
# on the target repo for a human to triage. The orchestrator does NOT mention
# @claude on the issues and does NOT trigger any downstream automation -
# issues are notifications only; a maintainer decides whether to implement,
# defer, or close.

on:
  repository_dispatch:
    types:
      - a2a-spec-updated
  workflow_dispatch:

permissions: {}

jobs:
  matrix:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.read.outputs.targets }}
    steps:
      - uses: actions/checkout@v6.0.2
      - id: read
        run: echo "targets=$(yq -o=json -I=0 '[.targets[] | select(.kind == "adk")]' repos.yaml)" >> "$GITHUB_OUTPUT"

  sync:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout orchestrator (.github)
        uses: actions/checkout@v6.0.2

      - name: Mint GitHub App token
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.BOT_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.BOT_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v6.0.2
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Resolve canonical spec SHA (current main HEAD of schemas)
        id: spec
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          sha=$(gh api repos/inference-gateway/schemas/commits/main --jq .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull canonical a2a-schema.yaml
        run: |
          set -euo pipefail
          (cd target && task a2a:download-schema)
          cp target/schema.yaml schema.yaml
          test -s schema.yaml

      - name: Install maintainer skill
        run: |
          mkdir -p ~/.claude/skills
          rm -rf ~/.claude/skills/maintainer
          curl -fsSL https://codeload.github.com/inference-gateway/skills/tar.gz/main |
            tar -xz --strip-components=2 -C ~/.claude/skills skills-main/skills/maintainer

      - name: Audit target against A2A schema and file drift issues
        uses: anthropics/claude-code-action@v1.0.133
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.token.outputs.token }}
          display_report: true
          claude_args: |
            --effort max
            --model claude-opus-4-7
            --allowedTools "Read,Bash(gh:*),Bash(git:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(wc:*),Bash(diff:*),Bash(yq:*),Bash(jq:*)"
          prompt: |
            You are auditing the GitHub repository `inference-gateway/${{ matrix.target.name }}`
            (${{ matrix.target.language }}, kind=${{ matrix.target.kind }}) against the
            canonical A2A JSON-RPC schema at `inference-gateway/schemas`. Detect
            drift and file structured issues on the target repo so a maintainer
            can review and triage them.

            Use the `maintainer` skill for org conventions and issue filing
            behavior. The workflow-specific drift class table below is
            authoritative for exact titles, Issue Types, and labels.

            **You are NOT triggering any automation. Do not mention `@claude`
            anywhere in issue titles, bodies, or comments. Issues are
            notifications for a human reviewer; the maintainer will decide
            whether to implement, defer, or close.**

            **Inputs already on disk:**
            - `./schema.yaml` - the canonical A2A schema at SHA `${{ steps.spec.outputs.sha }}`
              (sourced from `a2a/a2a-schema.yaml` in `inference-gateway/schemas`)
            - `./target/` - the target repo's working tree at its default branch.
              `target/schema.yaml` has just been refreshed by
              `task a2a:download-schema`, so `git -C target diff schema.yaml`
              reveals any pre-existing vendored-spec staleness (drift class D).

            **Authentication:** use `gh` (token in `GH_TOKEN`). The token has
            `issues:write` on `inference-gateway/${{ matrix.target.name }}` and
            `contents:read` on it and `inference-gateway/schemas`. No other
            permissions. Do not attempt to push, open PRs, or modify code.

            ---

            ## What to audit

            Check four drift classes:

            **A. JSON-RPC method coverage.** For each A2A JSON-RPC method
            declared in `schema.yaml` (e.g. `message/send`, `message/stream`,
            `tasks/get`, `tasks/list`, `tasks/cancel`, and the
            `tasks/pushNotificationConfig/*` family), is there a corresponding
            public method on the ADK's server handler / client surface?
            Account for naming conventions across languages (snake_case in
            Rust, PascalCase in Go, camelCase in TypeScript). The Go ADK
            exposes its surface via the `A2AServer` / `A2AClient` types and
            their methods. The Rust ADK exposes its surface via `A2AServer`,
            `A2AServerBuilder`, `A2AClient` (see `src/lib.rs` re-exports).
            Streaming variants (e.g. `message/stream`) count as coverage for
            their non-streaming siblings only when the schema lists both
            separately.

            **B. Generated types.** Does the ADK's committed generated-types
            file reference all top-level component schemas in `schema.yaml`?
            You don't need to re-run codegen - visual name inspection is
            enough. Common locations:
            - adk (Go): `types/generated_types.go`
            - rust-adk: `src/a2a_types.rs`
            - typescript-adk (future): likely `src/types/generated/index.ts` -
              confirm by inspection if the target is added later.

            **C. README / examples.** Is each spec JSON-RPC method
            demonstrated in either `README.md` or the `examples/` folder?
            Aliases count.

            **D. Vendored spec staleness.** The workflow has already run
            `task a2a:download-schema` inside `./target/`, which overwrites
            the ADK's vendored `schema.yaml` with the canonical one. Run
            `git -C target diff schema.yaml` - a non-empty diff means the
            committed vendored copy was out of sync with the canonical.

            ## What to do for each finding

            For each drift class with at least one missing item, file or refresh
            **exactly one** issue on `inference-gateway/${{ matrix.target.name }}`.
            Use these **exact** stable titles for de-dup (idempotency depends
            on byte-exact title match), with the matching Issue Type and labels:

            | Class | Title | Type | Labels |
            | --- | --- | --- | --- |
            | A | `[FEATURE] Implement missing A2A JSON-RPC methods` | `feature` | `enhancement,adk-drift` |
            | B | `[TASK] Refactor regenerate A2A types from latest schema` | `task` | `refactor,adk-drift` |
            | C | `[FEATURE] Add usage examples for missing A2A methods` | `feature` | `enhancement,adk-drift` |
            | D | `[TASK] Refactor sync vendored schema.yaml with schemas` | `task` | `refactor,adk-drift` |

            **Body shape** must follow the org's `feature_request.md` /
            `refactor_request.md` template style. Do not include `@claude`
            anywhere:

            ```
            ## Summary

            <one paragraph naming the gap, mentioning spec SHA
            `${{ steps.spec.outputs.sha }}` and linking
            https://github.com/inference-gateway/schemas/blob/${{ steps.spec.outputs.sha }}/a2a/a2a-schema.yaml>

            <bulleted gap list - JSON-RPC methods, schema names, or file paths
            as appropriate>

            ### Acceptance Criteria

            - [ ] <concrete, repo-specific step 1>
            - [ ] <concrete, repo-specific step 2>
            - [ ] PR passes the target repo's existing CI workflow.
            - [ ] PR description links this issue.

            ---

            <sub>Filed automatically by the inference-gateway sync orchestrator. Re-runs refresh this body in place. A maintainer should review and decide on next steps.</sub>
            ```

            ## Idempotency

            Before creating any issue, search for an existing open issue with
            the exact same title:

            ```
            gh issue list --repo inference-gateway/${{ matrix.target.name }} \
              --state open \
              --search "in:title \"<exact title>\"" \
              --json number,title
            ```

            - If a match exists: `gh issue edit <num> --body-file -` (read body
              from stdin) to refresh, then `gh issue comment <num> --body
              "Spec has changed - refreshed gap list above. Spec is now at ${{ steps.spec.outputs.sha }}."`
            - If no match: `gh issue create` with the labels from the table
              above for that class (e.g. `--label enhancement,adk-drift` for
              class A/C, `--label refactor,adk-drift` for class B/D).

            ## Setting the Issue Type

            Follow the maintainer skill's GitHub Issues procedure to set the
            Issue Type after every create or edit. Resolve the org's Issue
            Type IDs once, match the class type from the table above
            case-insensitively, and use `updateIssueIssueType`. If the lookup
            returns no matching type, log
            `warn: missing issue type "<name>" on inference-gateway org - leaving issue untyped`
            and continue - do not fail the run.

            ## Hard rules

            - Never modify any file under `./target/`.
            - Never open a PR.
            - Never mention `@claude` in issue titles, bodies, or comments.
            - File at most one issue per drift class per run.
            - If the target is fully in sync, file nothing and just print
              `summary: target=${{ matrix.target.name }} status=in-sync`.
            - End with a single-line summary, e.g.
              `summary: target=${{ matrix.target.name }} filed=[A,C] clean=[B,D]`.
