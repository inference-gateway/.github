---
name: Sync docs with spec

# Manual-only audit of the docs site against the canonical OpenAPI spec at
# inference-gateway/schemas. Runs Claude Code Action with an audit prompt
# that detects coverage drift and files structured issues on the docs repo
# for a human to triage. The orchestrator does NOT mention @claude on the
# issues and does NOT trigger any downstream automation - issues are
# notifications only; a maintainer decides whether to implement, defer, or
# close.
#
# SDK targets are NOT audited here anymore: deterministic type sync for the
# OpenAPI consumers (sdk, python-sdk, rust-sdk, typescript-sdk,
# inference-gateway) lives in the reusable schemas-sync.yml + per-repo thin
# callers, fanned out by the schemas repo's sync-downstream.yml.

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Single repos.yaml docs target to audit (omit = all docs targets). Use to test on one repo.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Audit and print the issues that WOULD be filed, without creating/editing/closing any (manual runs preview by default)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.read.outputs.targets }}
    steps:
      - uses: actions/checkout@v7.0.1
      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: '.kind == "docs"'
          repository: ${{ inputs.repository }}

  sync:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout orchestrator (.github)
        uses: actions/checkout@v7.0.1

      - name: Mint GitHub App token
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.INFERENCE_GATEWAY_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v7.0.1
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Resolve canonical spec SHA (current main HEAD of schemas)
        id: spec
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          sha=$(gh api repos/inference-gateway/schemas/commits/main --jq .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Pull canonical openapi.yaml
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/inference-gateway/schemas/${{ steps.spec.outputs.sha }}/openapi.yaml" \
            -o openapi.yaml
          test -s openapi.yaml

      - name: Audit target against spec and file drift issues
        uses: anthropics/claude-code-action@v1.0.180
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.token.outputs.token }}
          display_report: true
          claude_args: |
            --effort max
            --model claude-opus-4-8
            --allowedTools "Read,Bash(gh:*),Bash(git:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(wc:*),Bash(diff:*),Bash(yq:*),Bash(jq:*)"
          prompt: |
            You are auditing the GitHub repository `inference-gateway/${{ matrix.target.name }}`
            (${{ matrix.target.language }}, kind=${{ matrix.target.kind }}) against the
            canonical OpenAPI spec at `inference-gateway/schemas`. Detect drift
            and file structured issues on the target repo so a maintainer can
            review and triage them.

            The workflow-specific drift class table below is authoritative for
            exact titles, Issue Types, and labels.

            **You are NOT triggering any automation. Do not mention `@claude`
            anywhere in issue titles, bodies, or comments. Issues are
            notifications for a human reviewer; the maintainer will decide
            whether to implement, defer, or close.**

            **DRY-RUN MODE.** The environment variable `DRY_RUN` is `${{ inputs.dry_run || 'false' }}`
            for this run. When `DRY_RUN` is `true` you MUST NOT create, edit,
            comment on, close, or otherwise mutate ANY issue, and you MUST NOT
            call `gh issue create`, `gh issue edit`, `gh issue comment`,
            `gh issue close`, or the `updateIssueIssueType` mutation. Instead,
            run the SAME read-only audit and the SAME idempotency search
            (`gh issue list --search 'in:title ...'` is allowed - it is
            read-only), then PRINT, to your text output and to
            `$GITHUB_STEP_SUMMARY`, the exact list of issues you WOULD file or
            refresh: for each, the BYTE-EXACT title from the drift-class table,
            the drift class letter, whether it would be a create or an in-place
            edit of an existing issue (with its number), and the one-line gap
            summary. Do not invent or alter titles - the printed title must be
            byte-identical to what a real run would use, because titles are
            idempotency keys. End with the usual `summary:` line plus `mode=dry-run`.
            When `DRY_RUN` is `false`, behave exactly as specified below
            (create/refresh issues for real).

            **Inputs already on disk:**
            - `./openapi.yaml` - the canonical OpenAPI spec at SHA `${{ steps.spec.outputs.sha }}`
            - `./target/` - the target repo's working tree at its default branch

            **Authentication:** use `gh` (token in `GH_TOKEN`). The token has
            `issues:write` on `inference-gateway/${{ matrix.target.name }}` and
            `contents:read` on it and `inference-gateway/schemas`. No other
            permissions. Do not attempt to push, open PRs, or modify code.

            ---

            ## What to audit

            **Internal endpoints - fully exempt.** The five proxy operations
            (`proxyGet`, `proxyPost`, `proxyPut`, `proxyDelete`, `proxyPatch`)
            under `/proxy/{provider}/{path}` are gateway-internal pass-through
            helpers, **not** part of the docs site's public surface. Treat
            them as covered - never flag them as missing docs. This is
            load-bearing: the issue tracker has been polluted by repeated
            false-positive issues about these endpoints.

            For a **docs** target (`kind=docs`), check one drift class:

            **E. Docs coverage.** Is each `operationId` AND each top-level
            component schema name mentioned somewhere under `markdown/**/*.mdx`
            or `app/**`? An operation is covered if either its `operationId`
            or its full `METHOD /path` appears anywhere in the corpus.
            (Proxy operations are exempt - see "Internal endpoints" above.)

            ## What to do for each finding

            For each drift class with at least one missing item, file or refresh
            **exactly one** issue on `inference-gateway/${{ matrix.target.name }}`.
            Use these **exact** stable titles for de-dup (idempotency depends
            on byte-exact title match), with the matching Issue Type and labels:

            | Class | Title | Type | Labels |
            | --- | --- | --- | --- |
            | E | `[DOCS] Document missing operations and schemas` | `documentation` | `documentation,sdk-drift` |

            **Body shape** must follow the org's `feature_request.md` /
            `refactor_request.md` template style. Do not include `@claude`
            anywhere:

            ```
            ## Summary

            <one paragraph naming the gap, mentioning spec SHA
            `${{ steps.spec.outputs.sha }}` and linking
            https://github.com/inference-gateway/schemas/blob/${{ steps.spec.outputs.sha }}/openapi.yaml>

            <bulleted gap list - operationIds, schema names, or file paths
            as appropriate>

            ### Acceptance Criteria

            - [ ] <concrete, repo-specific step 1>
            - [ ] <concrete, repo-specific step 2>
            - [ ] PR passes the target repo's existing CI workflow.
            - [ ] PR description links this issue.

            ---

            <sub>Filed automatically by the inference-gateway sync orchestrator. Re-runs refresh this body in place. A maintainer should review and decide on next steps.</sub>
            ```

            ## Idempotency

            Before creating any issue, search for an existing open issue with
            the exact same title:

            ```
            gh issue list --repo inference-gateway/${{ matrix.target.name }} \
              --state open \
              --search "in:title \"<exact title>\"" \
              --json number,title
            ```

            - If a match exists: `gh issue edit <num> --body-file -` (read body
              from stdin) to refresh, then `gh issue comment <num> --body
              "Spec has changed - refreshed gap list above. Spec is now at ${{ steps.spec.outputs.sha }}."`
            - If no match: `gh issue create` with the labels from the table
              above for that class (`--label documentation,sdk-drift` for
              class E).

            ## Setting the Issue Type

            `gh issue create/edit` has no `--type` flag, so set the Issue Type
            with one GraphQL mutation after every create or edit. Match the
            class's Type (case-insensitively) against this org-stable table to
            get the type id:

            | Type    | Issue Type id          |
            | ------- | ---------------------- |
            | bug     | `IT_kwDOC6ve6c4Bf3qh`  |
            | feature | `IT_kwDOC6ve6c4Bf3qi`  |
            | task    | `IT_kwDOC6ve6c4Bf3qg`  |

            Resolve the issue's node id with `gh issue view <url> --json id -q .id`,
            then send the mutation (paste the node id and the matched type id
            literally - this shell has `$(...)` disabled):

            `gh api graphql -f query='mutation($id:ID!,$t:ID!){updateIssueIssueType(input:{issueId:$id,issueTypeId:$t}){issue{number issueType{name}}}}' -f id="<node-id>" -f t="<type-id>"`

            If the class's Type is not in the table above (e.g. `documentation`),
            log `warn: missing issue type "<name>" on inference-gateway org - leaving issue untyped`
            and continue - do not fail the run.

            ## Hard rules

            - When `DRY_RUN` is `true`, mutate nothing: no `gh issue create`,
              `gh issue edit`, `gh issue comment`, `gh issue close`, or
              `updateIssueIssueType`. Print the would-file list instead (see
              "DRY-RUN MODE" above).
            - Never modify any file under `./target/`.
            - Never open a PR.
            - Never mention `@claude` in issue titles, bodies, or comments.
            - File at most one issue per drift class per run.
            - For the `docs` target (`kind=docs`), never use em dashes (`-`,
              U+2014) or en dashes (`–`, U+2013) in issue titles, bodies, or
              comments - use a plain ASCII hyphen-minus (`-`, U+002D) instead.
              This applies to every character you emit for that target,
              including the `<sub>` footer and the "Spec has changed" comment.
            - If the target is fully in sync, file nothing and just print
              `summary: target=${{ matrix.target.name }} status=in-sync`.
            - End with a single-line summary, e.g.
              `summary: target=${{ matrix.target.name }} filed=[E]` or
              `summary: target=${{ matrix.target.name }} clean=[E]`.
