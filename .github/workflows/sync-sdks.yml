---
name: Sync SDKs and docs with spec

# Triggered when the canonical OpenAPI spec at inference-gateway/schemas
# changes (via repository_dispatch from that repo) or manually. For each
# target in repos.yaml, runs Claude Code Action with a single audit prompt
# that detects drift and files structured issues on the target repo for a
# human to triage. The orchestrator does NOT mention @claude on the issues
# and does NOT trigger any downstream automation - issues are notifications
# only; a maintainer decides whether to implement, defer, or close.

on:
  repository_dispatch:
    types:
      - spec-updated
  workflow_dispatch:
    inputs:
      repository:
        description: 'Single repos.yaml sdk/docs target to audit (omit = all). Use to test on one repo.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Audit and print the issues that WOULD be filed, without creating/editing/closing any (manual runs preview by default; spec-updated events file for real)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.read.outputs.targets }}
    steps:
      - uses: actions/checkout@v6.0.3
      - id: read
        uses: ./.github/actions/resolve-targets
        with:
          select: '.kind == "sdk" or .kind == "docs"'
          repository: ${{ inputs.repository }}

  sync:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout orchestrator (.github)
        uses: actions/checkout@v6.0.3

      - name: Mint GitHub App token
        id: token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.BOT_MAINTAINER_APP_ID }}
          private-key: ${{ secrets.BOT_MAINTAINER_APP_PRIVATE_KEY }}
          owner: inference-gateway
          repositories: |
            ${{ matrix.target.name }}

      - name: Checkout target
        uses: actions/checkout@v6.0.3
        with:
          repository: inference-gateway/${{ matrix.target.name }}
          path: target
          token: ${{ steps.token.outputs.token }}

      - name: Resolve canonical spec SHA (current main HEAD of schemas)
        id: spec
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          sha=$(gh api repos/inference-gateway/schemas/commits/main --jq .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull canonical openapi.yaml
        run: |
          set -euo pipefail
          if [ "${{ matrix.target.kind }}" = "sdk" ]; then
            (cd target && task oas-download)
            cp target/openapi.yaml openapi.yaml
          else
            curl -fsSL \
              "https://raw.githubusercontent.com/inference-gateway/schemas/${{ steps.spec.outputs.sha }}/openapi.yaml" \
              -o openapi.yaml
          fi
          test -s openapi.yaml

      - name: Install maintainer skill
        run: |
          mkdir -p ~/.claude/skills
          rm -rf ~/.claude/skills/maintainer
          curl -fsSL https://codeload.github.com/inference-gateway/skills/tar.gz/main |
            tar -xz --strip-components=2 -C ~/.claude/skills skills-main/skills/maintainer

      - name: Audit target against spec and file drift issues
        uses: anthropics/claude-code-action@v1.0.135
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.token.outputs.token }}
          display_report: true
          claude_args: |
            --effort ultracode
            --model claude-opus-4-8
            --allowedTools "Read,Bash(gh:*),Bash(git:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(wc:*),Bash(diff:*),Bash(yq:*),Bash(jq:*)"
          prompt: |
            You are auditing the GitHub repository `inference-gateway/${{ matrix.target.name }}`
            (${{ matrix.target.language }}, kind=${{ matrix.target.kind }}) against the
            canonical OpenAPI spec at `inference-gateway/schemas`. Detect drift
            and file structured issues on the target repo so a maintainer can
            review and triage them.

            Use the `maintainer` skill for org conventions and issue filing
            behavior. The workflow-specific drift class table below is
            authoritative for exact titles, Issue Types, and labels.

            **You are NOT triggering any automation. Do not mention `@claude`
            anywhere in issue titles, bodies, or comments. Issues are
            notifications for a human reviewer; the maintainer will decide
            whether to implement, defer, or close.**

            **DRY-RUN MODE.** The environment variable `DRY_RUN` is `${{ inputs.dry_run || 'false' }}`
            for this run. When `DRY_RUN` is `true` you MUST NOT create, edit,
            comment on, close, or otherwise mutate ANY issue, and you MUST NOT
            call `gh issue create`, `gh issue edit`, `gh issue comment`,
            `gh issue close`, or the `updateIssueIssueType` mutation. Instead,
            run the SAME read-only audit and the SAME idempotency search
            (`gh issue list --search 'in:title ...'` is allowed - it is
            read-only), then PRINT, to your text output and to
            `$GITHUB_STEP_SUMMARY`, the exact list of issues you WOULD file or
            refresh: for each, the BYTE-EXACT title from the drift-class table,
            the drift class letter, whether it would be a create or an in-place
            edit of an existing issue (with its number), and the one-line gap
            summary. Do not invent or alter titles - the printed title must be
            byte-identical to what a real run would use, because titles are
            idempotency keys. End with the usual `summary:` line plus `mode=dry-run`.
            When `DRY_RUN` is `false`, behave exactly as specified below
            (create/refresh issues for real). Automatic `spec-updated` runs set
            `DRY_RUN=false`.

            **Inputs already on disk:**
            - `./openapi.yaml` - the canonical OpenAPI spec at SHA `${{ steps.spec.outputs.sha }}`
            - `./target/` - the target repo's working tree at its default branch
              (for SDK targets, `target/openapi.yaml` has just been refreshed
              by `task oas-download`, so `git -C target diff openapi.yaml`
              reveals any pre-existing vendored-spec staleness - drift class D)

            **Authentication:** use `gh` (token in `GH_TOKEN`). The token has
            `issues:write` on `inference-gateway/${{ matrix.target.name }}` and
            `contents:read` on it and `inference-gateway/schemas`. No other
            permissions. Do not attempt to push, open PRs, or modify code.

            ---

            ## What to audit

            **Internal endpoints - fully exempt.** The five proxy operations
            (`proxyGet`, `proxyPost`, `proxyPut`, `proxyDelete`, `proxyPatch`)
            under `/proxy/{provider}/{path}` are gateway-internal pass-through
            helpers, **not** part of any SDK's or docs site's public surface.
            Treat them as covered across **every** drift class (A, C, E) -
            never flag them as missing operations, missing examples, or
            missing docs, regardless of whether a verb-collapsed
            `proxy_request` helper exists. This is load-bearing: the issue
            tracker has been polluted by repeated false-positive class A
            issues about these endpoints.

            For an **SDK** target (`kind=sdk`), check four drift classes:

            **A. Operation coverage.** For each `operationId` in the spec, is
            there a corresponding public method in the SDK's client surface?
            Account for naming conventions across languages (snake_case in
            Python/Rust, camelCase in TypeScript, PascalCase in Go). Streaming
            variants (e.g. `*_stream`, `stream*`) count as coverage. (Proxy
            operations are exempt - see "Internal endpoints" above.)
            The Rust SDK exposes its API via a `pub trait` -
            the trait's method names are the surface. The Go SDK uses
            `clientImpl` as the receiver; exported methods on it are the surface.

            **B. Generated models / types.** Does the SDK's committed
            generated-types file reference all top-level component schemas in
            the spec? You don't need to re-run codegen - visual name inspection
            is enough. Common locations:
            - python-sdk: `inference_gateway/models.py`
            - typescript-sdk: `src/types/generated/index.ts`
            - rust-sdk: `src/generated/schemas.rs`
            - sdk (Go): `generated_types.go`

            **C. README / examples.** Is each spec operation demonstrated in
            either `README.md` or the `examples/` folder? Aliases count.
            (Proxy operations are exempt - see "Internal endpoints" above.)

            **D. Vendored spec staleness.** The workflow has already run
            `task oas-download` inside `./target/`, which overwrites the
            SDK's vendored `openapi.yaml` with the canonical one. Run
            `git -C target diff openapi.yaml` - a non-empty diff means the
            committed vendored copy was out of sync with the canonical.
            For docs targets, this class does not apply.

            For a **docs** target (`kind=docs`), check one drift class:

            **E. Docs coverage.** Is each `operationId` AND each top-level
            component schema name mentioned somewhere under `markdown/**/*.mdx`
            or `app/**`? An operation is covered if either its `operationId`
            or its full `METHOD /path` appears anywhere in the corpus.
            (Proxy operations are exempt - see "Internal endpoints" above.)

            ## What to do for each finding

            For each drift class with at least one missing item, file or refresh
            **exactly one** issue on `inference-gateway/${{ matrix.target.name }}`.
            Use these **exact** stable titles for de-dup (idempotency depends
            on byte-exact title match), with the matching Issue Type and labels:

            | Class | Title | Type | Labels |
            | --- | --- | --- | --- |
            | A | `[FEATURE] Implement missing OpenAPI operations` | `feature` | `enhancement,sdk-drift` |
            | B | `[TASK] Refactor regenerate models from latest spec` | `task` | `refactor,sdk-drift` |
            | C | `[FEATURE] Add usage examples for missing operations` | `feature` | `enhancement,sdk-drift` |
            | D | `[TASK] Refactor sync vendored openapi.yaml with schemas` | `task` | `refactor,sdk-drift` |
            | E | `[DOCS] Document missing operations and schemas` | `documentation` | `documentation,sdk-drift` |

            **Body shape** must follow the org's `feature_request.md` /
            `refactor_request.md` template style. Do not include `@claude`
            anywhere:

            ```
            ## Summary

            <one paragraph naming the gap, mentioning spec SHA
            `${{ steps.spec.outputs.sha }}` and linking
            https://github.com/inference-gateway/schemas/blob/${{ steps.spec.outputs.sha }}/openapi.yaml>

            <bulleted gap list - operationIds, schema names, or file paths
            as appropriate>

            ### Acceptance Criteria

            - [ ] <concrete, repo-specific step 1>
            - [ ] <concrete, repo-specific step 2>
            - [ ] PR passes the target repo's existing CI workflow.
            - [ ] PR description links this issue.

            ---

            <sub>Filed automatically by the inference-gateway sync orchestrator. Re-runs refresh this body in place. A maintainer should review and decide on next steps.</sub>
            ```

            ## Idempotency

            Before creating any issue, search for an existing open issue with
            the exact same title:

            ```
            gh issue list --repo inference-gateway/${{ matrix.target.name }} \
              --state open \
              --search "in:title \"<exact title>\"" \
              --json number,title
            ```

            - If a match exists: `gh issue edit <num> --body-file -` (read body
              from stdin) to refresh, then `gh issue comment <num> --body
              "Spec has changed - refreshed gap list above. Spec is now at ${{ steps.spec.outputs.sha }}."`
            - If no match: `gh issue create` with the labels from the table
              above for that class (e.g. `--label enhancement,sdk-drift` for
              class A/C, `--label refactor,sdk-drift` for class B/D,
              `--label documentation,sdk-drift` for class E).

            ## Setting the Issue Type

            Follow the maintainer skill's GitHub Issues procedure to set the
            Issue Type after every create or edit. Resolve the org's Issue
            Type IDs once, match the class type from the table above
            case-insensitively, and use `updateIssueIssueType`. If the lookup
            returns no matching type, log
            `warn: missing issue type "<name>" on inference-gateway org - leaving issue untyped`
            and continue - do not fail the run.

            ## Hard rules

            - When `DRY_RUN` is `true`, mutate nothing: no `gh issue create`,
              `gh issue edit`, `gh issue comment`, `gh issue close`, or
              `updateIssueIssueType`. Print the would-file list instead (see
              "DRY-RUN MODE" above).
            - Never modify any file under `./target/`.
            - Never open a PR.
            - Never mention `@claude` in issue titles, bodies, or comments.
            - File at most one issue per drift class per run.
            - For the `docs` target (`kind=docs`), never use em dashes (`—`,
              U+2014) or en dashes (`–`, U+2013) in issue titles, bodies, or
              comments — use a plain ASCII hyphen-minus (`-`, U+002D) instead.
              This applies to every character you emit for that target,
              including the `<sub>` footer and the "Spec has changed" comment.
            - If the target is fully in sync, file nothing and just print
              `summary: target=${{ matrix.target.name }} status=in-sync`.
            - End with a single-line summary, e.g.
              `summary: target=${{ matrix.target.name }} filed=[A,C] clean=[B,D]`.
