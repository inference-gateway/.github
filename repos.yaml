# Unified downstream registry for inference-gateway/.github orchestrators.
#
# ONE list: `targets`. Every orchestrator reads it through the shared composite action
# .github/actions/resolve-targets, passing a jq `select` expression (no more per-workflow yq
# shapes, no second `claude_targets` list).
#
# Per-entry schema:
#   name           (required)  repo name under inference-gateway/
#   kind           (required)  sdk | docs | adk | agent | none  -> routes to workflows:
#                                sdk   -> sync-sdks.yml (drift classes A-D)
#                                docs  -> sync-sdks.yml (drift class E)
#                                adk   -> sync-adks.yml
#                                agent -> bump-adl.yml, refresh-agent-manifest.yml, trigger-cd.yml
#                                none  -> infra/tooling repos with no sync/agent family;
#                                         migrate-claude / migrate-infer / migrate-codex only
#                              stale.yml sweeps `select(.kind != "none")` (every product repo
#                              EXCEPT the kind: none repos, which are intentionally not
#                              auto-staled). cleanup-runs.yml sweeps `select(true)` -> ALL
#                              registered targets, every kind incl. none. migrate-codex.yml writes
#                              the codex.yml caller + bumps the Flox codex pin on
#                              `select(.orchestrators.codex != null)` -> every repo with a centralized
#                              codex.yml caller (every non-agent kind). Private repos are never
#                              registered here, so cleanup excludes them by construction; do NOT
#                              add a private repo to this list or cleanup would sweep it.
#   language       (required)  LOWERCASE TOOLCHAIN: go | rust | typescript | python | node | bun. Single
#                              source for both the sync-* audit-prompt display token and the bot
#                              toolchain: the migrate workflows inject it as the `language` input of
#                              each reusable bot workflow, and refresh-agent-manifest.yml maps it to
#                              the adl --language flag (case go|rust|typescript). For kind: none repos
#                              it only feeds the bots.
#   orchestrators  (optional)  Per-repo inputs for the org's reusable AI-bot workflows. Presence of a
#                              sub-block => this repo has a CENTRALIZED .github/workflows/<bot>.yml that
#                              is a thin caller of the matching org reusable workflow. Three sub-blocks:
#                                claude -> migrate-claude.yml operates on every `orchestrators.claude != null`
#                                          entry; sub-keys map 1:1 to claude.yml inputs.
#                                          `plugins` (string) Newline-separated GitHub plugin marketplaces
#                                          (owner/repo) registered + enabled for @claude, mirroring infer:
#                                          each becomes an extraKnownMarketplaces + enabledPlugins entry in
#                                          claude-code-action's `settings` (plugin name = repo basename).
#                                          `skills` accepted for forward-compat but unused.
#                                infer  -> migrate-infer.yml operates on every `orchestrators.infer != null`
#                                          entry; sub-keys map 1:1 to infer.yml inputs.
#                                          `skills`  (string) Newline-separated org skills for infer-action. Default ''.
#                                          `plugins` (string) Newline-separated org plugins for infer-action. Default ''.
#                                codex  -> migrate-codex.yml operates on every `orchestrators.codex != null`
#                                          entry; sub-keys map 1:1 to codex.yml inputs (no allowed-tools /
#                                          extra-tools / browser / context7 analog - codex-action has none).
#                                          `skills`/`plugins` accepted for forward-compat but unused.
#                              The migrate workflows prepend the top-level `language` to each bot's
#                              `with:` block, so the sub-blocks carry ONLY non-language inputs
#                              (markdownlint, node, precommit, browser, allowed-tools, extra-tools,
#                              debug, ...). `debug: true` is supported by all three bots (claude / infer /
#                              codex) and surfaces verbose agent logs in the Actions run log - keep it to
#                              PRIVATE repos, since debug/transcript output can include sensitive values.
#                              A repo that needs no extra inputs uses an explicit empty map
#                              (`claude: {}` / `infer: {}` / `codex: {}`) so the `!= null` selection still
#                              matches it; a bare `claude:` would be YAML null and silently drop the repo.
#                              Omitted sub-keys take the reusable workflow defaults.
#                              ABSENT for the 6 kind=agent repos: their claude.yml is generated by adl-cli
#                              (ai-claude-code.yaml.tmpl) and migrates via the generator + bump-adl.yml,
#                              never by overwriting a committed file.
#
# Adding/removing a repo = one PR editing this file. Validate the shape afterwards: see CLAUDE.md
# "Validate repos.yaml".

targets:
  # --- SDKs (sync-sdks.yml; all have centralized claude + infer + codex callers) ---
  - name: python-sdk
    kind: sdk
    language: python
    orchestrators:
      claude:
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: typescript-sdk
    kind: sdk
    language: typescript
    orchestrators:
      claude:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      codex:
        markdownlint: true
  - name: rust-sdk
    kind: sdk
    language: rust
    orchestrators:
      claude:
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: sdk
    kind: sdk
    language: go
    orchestrators:
      claude:
        node: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex:
        node: true

  # --- Docs site (sync-sdks.yml drift class E; centralized claude + infer + codex callers) ---
  - name: docs
    kind: docs
    language: bun
    orchestrators:
      claude:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      codex:
        markdownlint: true

  # --- ADKs (sync-adks.yml; all have centralized claude + infer + codex callers) ---
  - name: adk
    kind: adk
    language: go
    orchestrators:
      claude:
        node: true
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      codex:
        markdownlint: true
  - name: rust-adk
    kind: adk
    language: rust
    orchestrators:
      claude:
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: typescript-adk
    kind: adk
    language: typescript
    orchestrators:
      claude:
        markdownlint: true
        allowed-tools: "Bash(task:*),Bash(node:*),Bash(npm:*),Bash(pnpm:*)"
        plugins: |
          DietrichGebert/ponytail
      infer:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      codex:
        markdownlint: true

  # --- Agents (bump-adl / refresh-agent-manifest / trigger-cd).  ---
  - name: browser-agent
    kind: agent
    language: go
  - name: documentation-agent
    kind: agent
    language: go
  - name: google-calendar-agent
    kind: agent
    language: go
  - name: grafana-agent
    kind: agent
    language: go
  - name: mock-agent
    kind: agent
    language: go
  - name: n8n-agent
    kind: agent
    language: go

  # --- Infra/tooling repos (kind: none). Have centralized claude + infer + codex callers (migrate-claude /
  #     migrate-infer / migrate-codex). NOT swept by stale (select(.kind != "none")), but ARE swept by
  #     cleanup-runs (select(true) - all registered targets). ---
  - name: cli
    kind: none
    language: go
    orchestrators:
      claude:
        markdownlint: true
        precommit: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        markdownlint: true
        precommit: true
        plugins: |
          DietrichGebert/ponytail
      codex:
        markdownlint: true
        precommit: true
  - name: a2a-debugger
    kind: none
    language: go
    orchestrators:
      claude:
        allowed-tools: "Bash(task:*),Bash(go:*)"
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: adl-cli
    kind: none
    language: go
    orchestrators:
      claude:
        node: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex:
        node: true
  - name: adl
    kind: none
    language: node
    orchestrators:
      claude:
        browser: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: inference-gateway
    kind: none
    language: go
    orchestrators:
      claude:
        node: true
        extra-tools: "Bash(helm:*)"
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex:
        node: true
  - name: infer-action
    kind: none
    language: bun
    orchestrators:
      claude:
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: operator
    kind: none
    language: go
    orchestrators:
      claude:
        prettier: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        prettier: true
        plugins: |
          DietrichGebert/ponytail
      codex:
        prettier: true
  - name: registry
    kind: none
    language: typescript
    orchestrators:
      claude:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      infer:
        markdownlint: true
        plugins: |
          DietrichGebert/ponytail
      codex:
        markdownlint: true
  - name: schemas
    kind: none
    language: bun
    orchestrators:
      claude:
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: skills
    kind: none
    language: node
    orchestrators:
      claude:
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
  - name: agents
    kind: none
    language: node
    orchestrators:
      claude:
        plugins: |
          DietrichGebert/ponytail
      infer:
        plugins: |
          DietrichGebert/ponytail
      codex: {}
