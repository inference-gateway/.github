# Targets the sync-sdks workflow audits against the canonical OpenAPI spec
# at inference-gateway/schemas. Adding or removing a target = one PR here.

targets:
  - name: python-sdk
    language: Python
    kind: sdk
  - name: typescript-sdk
    language: TypeScript
    kind: sdk
  - name: rust-sdk
    language: Rust
    kind: sdk
  - name: sdk
    language: Go
    kind: sdk
  - name: docs
    language: MDX
    kind: docs
  - name: adk
    language: Go
    kind: adk
  - name: rust-adk
    language: Rust
    kind: adk
  - name: typescript-adk
    language: Typescript
    kind: adk
  - name: browser-agent
    language: Go
    kind: agent
  - name: documentation-agent
    language: Go
    kind: agent
  - name: google-calendar-agent
    language: Go
    kind: agent
  - name: grafana-agent
    language: Go
    kind: agent
  - name: mock-agent
    language: Go
    kind: agent
  - name: n8n-agent
    language: Go
    kind: agent
