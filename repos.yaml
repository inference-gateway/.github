# Unified downstream registry for inference-gateway/.github orchestrators.
#
# ONE list: `targets`. Every orchestrator reads it through the shared composite action
# .github/actions/resolve-targets, passing a jq `select` expression (no more per-workflow yq
# shapes, no second `claude_targets` list).
#
# Per-entry schema:
#   name      (required)  repo name under inference-gateway/
#   kind      (required)  sdk | docs | adk | agent | none  -> routes to workflows:
#                           sdk   -> sync-sdks.yml (drift classes A-D)
#                           docs  -> sync-sdks.yml (drift class E)
#                           adk   -> sync-adks.yml
#                           agent -> bump-adl.yml, refresh-agent-manifest.yml, trigger-cd.yml
#                           none  -> infra/tooling repos with no sync/agent family; migrate-claude only
#                         stale.yml + cleanup-skipped-runs.yml sweep `select(.kind != "none")`
#                         (every product repo EXCEPT the kind: none repos, which are
#                         intentionally not auto-swept).
#   language  (required)  DESCRIPTIVE label (Go/Rust/TypeScript/Python/MDX/Node/...). Read by the
#                         sync-* audit-prompt display and by refresh-agent-manifest.yml
#                         (case Go|Rust|TypeScript). Documentation-only for kind: none.
#   claude    (optional)  Presence => this repo has a CENTRALIZED .github/workflows/claude.yml that
#                         is a thin caller of the org reusable workflow. migrate-claude.yml operates
#                         on every entry where `claude != null`. Each sub-key maps 1:1 to a
#                         reusable-workflow input (claude.yml); omitted sub-keys take the reusable
#                         defaults (skill=maintainer, runner=ubuntu-24.04, effort=max, context7=true).
#                         The sub-key `language` is the LOWERCASE TOOLCHAIN
#                         (go|rust|python|typescript|node|none), distinct from top-level language.
#                         ABSENT for the 6 kind=agent repos: their claude.yml is generated by adl-cli
#                         (ai-claude-code.yaml.tmpl) and migrates via the generator + bump-adl.yml,
#                         never by overwriting a committed file.
#
# Adding/removing a repo = one PR editing this file. Validate the shape afterwards: see CLAUDE.md
# "Validate repos.yaml".

targets:
  # --- SDKs (sync-sdks.yml; all have centralized claude callers) ---
  - name: python-sdk
    kind: sdk
    language: Python
    claude:
      language: python
  - name: typescript-sdk
    kind: sdk
    language: TypeScript
    claude:
      language: typescript
      markdownlint: true
  - name: rust-sdk
    kind: sdk
    language: Rust
    claude:
      language: rust
  - name: sdk
    kind: sdk
    language: Go
    claude:
      language: go
      node: true

  # --- Docs site (sync-sdks.yml drift class E; centralized claude caller) ---
  - name: docs
    kind: docs
    language: MDX
    claude:
      language: node
      markdownlint: true

  # --- ADKs (sync-adks.yml; all have centralized claude callers) ---
  - name: adk
    kind: adk
    language: Go
    claude:
      language: go
      node: true
      markdownlint: true
  - name: rust-adk
    kind: adk
    language: Rust
    claude:
      language: rust
  - name: typescript-adk
    kind: adk
    language: TypeScript
    claude:
      language: typescript
      markdownlint: true
      # Preserves the deliberately narrowed gh scope + pnpm.
      allowed-tools: "Bash(task:*),Bash(node:*),Bash(npm:*),Bash(pnpm:*),Bash(gh pr:*),Bash(gh issue:*),Bash(gh repo:*)"

  # --- Agents (bump-adl / refresh-agent-manifest / trigger-cd). NO `claude:` block:
  #     claude.yml is adl-cli-generated and migrates via the generator + bump-adl.yml. ---
  - name: browser-agent
    kind: agent
    language: Go
  - name: documentation-agent
    kind: agent
    language: Go
  - name: google-calendar-agent
    kind: agent
    language: Go
  - name: grafana-agent
    kind: agent
    language: Go
  - name: mock-agent
    kind: agent
    language: Go
  - name: n8n-agent
    kind: agent
    language: Go

  # --- Infra/tooling repos (kind: none). Have centralized claude callers (migrate-claude),
  #     but are NOT swept by stale/cleanup (select(.kind != "none")). ---
  - name: cli
    kind: none
    language: Go
    claude:
      language: go
      markdownlint: true
      precommit: true
  - name: a2a-debugger
    kind: none
    language: Go
    claude:
      language: go
      # Preserves the deliberately narrowed gh scope.
      allowed-tools: "Bash(task:*),Bash(go:*),Bash(git:*),Bash(gh pr:*),Bash(gh issue:*),Bash(gh repo:*),Bash(gh run:*)"
  - name: adl-cli
    kind: none
    language: Go
    claude:
      language: go
      node: true
  - name: adl
    kind: none
    language: Node
    claude:
      language: node
      playwright: true
  - name: inference-gateway
    kind: none
    language: Go
    claude:
      language: go
      node: true
      extra-tools: "Bash(helm:*)"
  - name: infer-action
    kind: none
    language: Go
    claude:
      language: go
      node: true
  - name: operator
    kind: none
    language: Go
    claude:
      language: go
  - name: registry
    kind: none
    language: Go
    claude:
      language: go
      markdownlint: true
  - name: schemas
    kind: none
    language: Node
    claude:
      language: node
  - name: skills
    kind: none
    language: Node
    claude:
      language: none
      node: true
