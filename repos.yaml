# Unified downstream registry for inference-gateway/.github orchestrators.
#
# ONE list: `targets`. Every orchestrator reads it through the shared composite action
# .github/actions/resolve-targets, passing a jq `select` expression (no more per-workflow yq
# shapes, no second `claude_targets` list).
#
# Per-entry schema:
#   name           (required)  repo name under inference-gateway/
#   kind           (required)  sdk | docs | adk | agent | none  -> routes to workflows:
#                                sdk   -> sync-sdks.yml (drift classes A-D)
#                                docs  -> sync-sdks.yml (drift class E)
#                                adk   -> sync-adks.yml
#                                agent -> bump-adl.yml, refresh-agent-manifest.yml, trigger-cd.yml
#                                none  -> infra/tooling repos with no sync/agent family;
#                                         migrate-claude / migrate-infer only
#                              stale.yml + cleanup-skipped-runs.yml sweep `select(.kind != "none")`
#                              (every product repo EXCEPT the kind: none repos, which are
#                              intentionally not auto-swept).
#   language       (required)  DESCRIPTIVE label (Go/Rust/TypeScript/Python/MDX/Node/...). Read by the
#                              sync-* audit-prompt display and by refresh-agent-manifest.yml
#                              (case Go|Rust|TypeScript). Documentation-only for kind: none.
#   orchestrators  (optional)  Per-repo inputs for the org's reusable AI-bot workflows. Presence of a
#                              sub-block => this repo has a CENTRALIZED .github/workflows/<bot>.yml that
#                              is a thin caller of the matching org reusable workflow. Two sub-blocks:
#                                claude -> migrate-claude.yml operates on every `orchestrators.claude != null`
#                                          entry; sub-keys map 1:1 to claude.yml inputs.
#                                infer  -> migrate-infer.yml operates on every `orchestrators.infer != null`
#                                          entry; sub-keys map 1:1 to infer.yml inputs.
#                              Omitted sub-keys take the reusable workflow defaults. The sub-key
#                              `language` is the LOWERCASE TOOLCHAIN (go|rust|python|typescript|node|none),
#                              distinct from the top-level descriptive language.
#                              ABSENT for the 6 kind=agent repos: their claude.yml is generated by adl-cli
#                              (ai-claude-code.yaml.tmpl) and migrates via the generator + bump-adl.yml,
#                              never by overwriting a committed file.
#
# Adding/removing a repo = one PR editing this file. Validate the shape afterwards: see CLAUDE.md
# "Validate repos.yaml".

targets:
  # --- SDKs (sync-sdks.yml; all have centralized claude + infer callers) ---
  - name: python-sdk
    kind: sdk
    language: Python
    orchestrators:
      claude:
        language: python
      infer:
        language: python
  - name: typescript-sdk
    kind: sdk
    language: TypeScript
    orchestrators:
      claude:
        language: typescript
        markdownlint: true
      infer:
        language: typescript
        markdownlint: true
  - name: rust-sdk
    kind: sdk
    language: Rust
    orchestrators:
      claude:
        language: rust
      infer:
        language: rust
  - name: sdk
    kind: sdk
    language: Go
    orchestrators:
      claude:
        language: go
        node: true
      infer:
        language: go

  # --- Docs site (sync-sdks.yml drift class E; centralized claude + infer callers) ---
  - name: docs
    kind: docs
    language: MDX
    orchestrators:
      claude:
        language: node
        markdownlint: true
      infer:
        language: node
        markdownlint: true

  # --- ADKs (sync-adks.yml; all have centralized claude + infer callers) ---
  - name: adk
    kind: adk
    language: Go
    orchestrators:
      claude:
        language: go
        node: true
        markdownlint: true
      infer:
        language: go
        markdownlint: true
  - name: rust-adk
    kind: adk
    language: Rust
    orchestrators:
      claude:
        language: rust
      infer:
        language: rust
  - name: typescript-adk
    kind: adk
    language: TypeScript
    orchestrators:
      claude:
        language: typescript
        markdownlint: true
        # Preserves the deliberately narrowed gh scope + pnpm.
        allowed-tools: "Bash(task:*),Bash(node:*),Bash(npm:*),Bash(pnpm:*),Bash(gh pr:*),Bash(gh issue:*),Bash(gh repo:*)"
      infer:
        language: typescript
        markdownlint: true

  # --- Agents (bump-adl / refresh-agent-manifest / trigger-cd). NO `orchestrators:` block:
  #     claude.yml is adl-cli-generated and migrates via the generator + bump-adl.yml. ---
  - name: browser-agent
    kind: agent
    language: Go
  - name: documentation-agent
    kind: agent
    language: Go
  - name: google-calendar-agent
    kind: agent
    language: Go
  - name: grafana-agent
    kind: agent
    language: Go
  - name: mock-agent
    kind: agent
    language: Go
  - name: n8n-agent
    kind: agent
    language: Go

  # --- Infra/tooling repos (kind: none). Have centralized claude + infer callers (migrate-claude /
  #     migrate-infer), but are NOT swept by stale/cleanup (select(.kind != "none")). ---
  - name: cli
    kind: none
    language: Go
    orchestrators:
      claude:
        language: go
        markdownlint: true
        precommit: true
      infer:
        language: go
        markdownlint: true
  - name: a2a-debugger
    kind: none
    language: Go
    orchestrators:
      claude:
        language: go
        # Preserves the deliberately narrowed gh scope.
        allowed-tools: "Bash(task:*),Bash(go:*),Bash(git:*),Bash(gh pr:*),Bash(gh issue:*),Bash(gh repo:*),Bash(gh run:*)"
      infer:
        language: go
  - name: adl-cli
    kind: none
    language: Go
    orchestrators:
      claude:
        language: go
        node: true
      infer:
        language: go
  - name: adl
    kind: none
    language: Node
    orchestrators:
      claude:
        language: node
        playwright: true
      infer:
        language: node
  - name: inference-gateway
    kind: none
    language: Go
    orchestrators:
      claude:
        language: go
        node: true
        extra-tools: "Bash(helm:*)"
      infer:
        language: go
  - name: infer-action
    kind: none
    language: Go
    orchestrators:
      claude:
        language: go
        node: true
      infer:
        language: go
  - name: operator
    kind: none
    language: Go
    orchestrators:
      claude:
        language: go
      infer:
        language: go
  - name: registry
    kind: none
    language: Go
    orchestrators:
      claude:
        language: go
        markdownlint: true
      infer:
        language: go
        markdownlint: true
  - name: schemas
    kind: none
    language: Node
    orchestrators:
      claude:
        language: node
      infer:
        language: node
  - name: skills
    kind: none
    language: Node
    orchestrators:
      claude:
        language: none
        node: true
      infer:
        language: none
