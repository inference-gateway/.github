# Unified downstream registry for inference-gateway/.github orchestrators.
#
# ONE list: `targets`. Every orchestrator reads it through the shared composite action
# .github/actions/resolve-targets, passing a jq `select` expression (no more per-workflow yq
# shapes, no second `claude_targets` list).
#
# Per-entry schema:
#   name           (required)  repo name under inference-gateway/
#   kind           (required)  sdk | docs | adk | agent | none  -> routes to workflows:
#                                sdk   -> sync-sdks.yml (drift classes A-D)
#                                docs  -> sync-sdks.yml (drift class E)
#                                adk   -> sync-adks.yml
#                                agent -> bump-adl.yml, refresh-agent-manifest.yml, trigger-cd.yml
#                                none  -> infra/tooling repos with no sync/agent family;
#                                         migrate-claude / migrate-infer only
#                              stale.yml sweeps `select(.kind != "none")` (every product repo
#                              EXCEPT the kind: none repos, which are intentionally not
#                              auto-staled). cleanup-runs.yml sweeps `select(true)` -> ALL
#                              registered targets, every kind incl. none. bump-codex.yml sweeps
#                              `select(.kind != "agent")` -> every codex-bearing repo (all kinds
#                              except agent; codex is a local-authoring CLI absent from the
#                              adl-generated agent dev envs). Private repos are never
#                              registered here, so cleanup excludes them by construction; do NOT
#                              add a private repo to this list or cleanup would sweep it.
#   language       (required)  LOWERCASE TOOLCHAIN: go | rust | typescript | python | node | bun. Single
#                              source for both the sync-* audit-prompt display token and the bot
#                              toolchain: the migrate workflows inject it as the `language` input of
#                              each reusable bot workflow, and refresh-agent-manifest.yml maps it to
#                              the adl --language flag (case go|rust|typescript). For kind: none repos
#                              it only feeds the bots.
#   orchestrators  (optional)  Per-repo inputs for the org's reusable AI-bot workflows. Presence of a
#                              sub-block => this repo has a CENTRALIZED .github/workflows/<bot>.yml that
#                              is a thin caller of the matching org reusable workflow. Two sub-blocks:
#                                claude -> migrate-claude.yml operates on every `orchestrators.claude != null`
#                                          entry; sub-keys map 1:1 to claude.yml inputs.
#                                infer  -> migrate-infer.yml operates on every `orchestrators.infer != null`
#                                          entry; sub-keys map 1:1 to infer.yml inputs.
#                              The migrate workflows prepend the top-level `language` to each bot's
#                              `with:` block, so the sub-blocks carry ONLY non-language inputs
#                              (markdownlint, node, precommit, playwright, allowed-tools, extra-tools, ...).
#                              A repo that needs no extra inputs uses an explicit empty map
#                              (`claude: {}` / `infer: {}`) so the `!= null` selection still matches it;
#                              a bare `claude:` would be YAML null and silently drop the repo.
#                              Omitted sub-keys take the reusable workflow defaults.
#                              ABSENT for the 6 kind=agent repos: their claude.yml is generated by adl-cli
#                              (ai-claude-code.yaml.tmpl) and migrates via the generator + bump-adl.yml,
#                              never by overwriting a committed file.
#
# Adding/removing a repo = one PR editing this file. Validate the shape afterwards: see CLAUDE.md
# "Validate repos.yaml".

targets:
  # --- SDKs (sync-sdks.yml; all have centralized claude + infer callers) ---
  - name: python-sdk
    kind: sdk
    language: python
    orchestrators:
      claude: {}
      infer: {}
  - name: typescript-sdk
    kind: sdk
    language: typescript
    orchestrators:
      claude:
        markdownlint: true
      infer:
        markdownlint: true
  - name: rust-sdk
    kind: sdk
    language: rust
    orchestrators:
      claude: {}
      infer: {}
  - name: sdk
    kind: sdk
    language: go
    orchestrators:
      claude:
        node: true
      infer: {}

  # --- Docs site (sync-sdks.yml drift class E; centralized claude + infer callers) ---
  - name: docs
    kind: docs
    language: bun
    orchestrators:
      claude:
        markdownlint: true
      infer:
        markdownlint: true

  # --- ADKs (sync-adks.yml; all have centralized claude + infer callers) ---
  - name: adk
    kind: adk
    language: go
    orchestrators:
      claude:
        node: true
        markdownlint: true
      infer:
        markdownlint: true
  - name: rust-adk
    kind: adk
    language: rust
    orchestrators:
      claude: {}
      infer: {}
  - name: typescript-adk
    kind: adk
    language: typescript
    orchestrators:
      claude:
        markdownlint: true
        allowed-tools: "Bash(task:*),Bash(node:*),Bash(npm:*),Bash(pnpm:*)"
      infer:
        markdownlint: true

  # --- Agents (bump-adl / refresh-agent-manifest / trigger-cd).  ---
  - name: browser-agent
    kind: agent
    language: go
  - name: documentation-agent
    kind: agent
    language: go
  - name: google-calendar-agent
    kind: agent
    language: go
  - name: grafana-agent
    kind: agent
    language: go
  - name: mock-agent
    kind: agent
    language: go
  - name: n8n-agent
    kind: agent
    language: go

  # --- Infra/tooling repos (kind: none). Have centralized claude + infer callers (migrate-claude /
  #     migrate-infer). NOT swept by stale (select(.kind != "none")), but ARE swept by cleanup-runs
  #     (select(true) - all registered targets). ---
  - name: cli
    kind: none
    language: go
    orchestrators:
      claude:
        markdownlint: true
        precommit: true
      infer:
        markdownlint: true
  - name: a2a-debugger
    kind: none
    language: go
    orchestrators:
      claude:
        allowed-tools: "Bash(task:*),Bash(go:*)"
      infer: {}
  - name: adl-cli
    kind: none
    language: go
    orchestrators:
      claude:
        node: true
      infer: {}
  - name: adl
    kind: none
    language: node
    orchestrators:
      claude:
        playwright: true
      infer: {}
  - name: inference-gateway
    kind: none
    language: go
    orchestrators:
      claude:
        node: true
        extra-tools: "Bash(helm:*)"
      infer: {}
  - name: infer-action
    kind: none
    language: bun
    orchestrators:
      claude: {}
      infer: {}
  - name: operator
    kind: none
    language: go
    orchestrators:
      claude: {}
      infer: {}
  - name: registry
    kind: none
    language: typescript
    orchestrators:
      claude:
        markdownlint: true
      infer:
        markdownlint: true
  - name: schemas
    kind: none
    language: bun
    orchestrators:
      claude: {}
      infer: {}
  - name: skills
    kind: none
    language: node
    orchestrators:
      claude: {}
      infer: {}
  - name: agents
    kind: none
    language: node
    orchestrators:
      claude: {}
      infer: {}

  # --- Operating System (A new way to monitor and process tickets as they flow into the system).  ---
  - name: os
    kind: tooling
    language: bun
    orchestrators:
      claude: {}
      infer: {}
